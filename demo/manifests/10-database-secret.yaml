# The ONLY wiring between the app and the database: a DATABASE_URL Secret
# pointing at the scale-zero-pg gateway Service. This is the entire knext
# integration contract (docs/connecting.md, docs/knext-handoff-prompt.md).
#
# Host is always the gateway (pggw), never the compute. The gateway wakes the
# DB on the first connection and holds the socket during cold start (~2.5s).
# sslmode=disable: gateway declines TLS on this port; dev creds cloud_admin.
apiVersion: v1
kind: Secret
metadata:
  name: pg-demo-db
  namespace: knext-demo
type: Opaque
stringData:
  DATABASE_URL: "postgres://cloud_admin:cloud_admin@pggw.scale-zero-pg.svc.cluster.local:55432/postgres?sslmode=disable"
