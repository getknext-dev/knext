# The CNPG bake-off candidate: a single-instance PostgreSQL cluster with a small
# PVC. This is the CNPG analogue of the Neon "compute" — except the database
# state lives ON the PVC (stateful), not in a disaggregated storage plane.
#
# Scale-to-zero mechanism = CNPG *declarative hibernation*: the annotation
#   cnpg.io/hibernation: "on"   -> operator deletes the instance pod, KEEPS the PVC
#   cnpg.io/hibernation: "off"  -> operator recreates the pod, reattaches the PVC
# "Wake" therefore = pod (re)schedule + volume attach + Postgres crash-free start,
# NOT Neon's attach + lazy page fetch. That difference is exactly what the
# bake-off measures.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: bakeoff-cnpg
  labels: { app: bakeoff-cnpg }
spec:
  instances: 1 # single primary — apples-to-apples with the Neon single-compute MVP
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2 # pinned, matches Neon's PG17
  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: app
      owner: app
      secret:
        name: pg-app # known dev creds (app/app)

  storage:
    size: 1Gi # small PVC — this is the "ops mass" the Neon side trades away
    # default storageClass (OrbStack local-path)

  # Keep the footprint tiny; this is a latency/ops bake-off, not a load test.
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 512Mi }

  # Faster shutdown so hibernate (sleep) returns quickly, mirroring the Neon
  # compute's 10s drain. Data is fsync'd to the PVC, so a short window is safe.
  stopDelay: 15
  smartShutdownTimeout: 10
