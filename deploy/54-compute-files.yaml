# compute-files: the compute_ctl spec template (config.json, TENANT_ID/TIMELINE_ID
# placeholders) + entrypoint.sh (cold/primary) + entrypoint-ro.sh (read-replica pool)
# + entrypoint-warm.sh (warm tier, ADR-0002) + lib-harden.sh (SHARED pg_hba harden,
# issue #164 — sourced by all three entrypoints so #112/#117 can't drift).
# GENERATED from deploy/compute-files/ — edit those files and regenerate with:
#   kubectl create configmap compute-files -n scale-zero-pg \
#     --from-file=config.json=deploy/compute-files/config.json \
#     --from-file=entrypoint.sh=deploy/compute-files/entrypoint.sh \
#     --from-file=entrypoint-ro.sh=deploy/compute-files/entrypoint-ro.sh \
#     --from-file=entrypoint-warm.sh=deploy/compute-files/entrypoint-warm.sh \
#     --from-file=lib-harden.sh=deploy/compute-files/lib-harden.sh \
#     --dry-run=client -o yaml
# then re-append the compute-config ConfigMap below (it is env, not file-generated).
# Rationale for the non-obvious Postgres settings (fsync=off etc.) lives in
# deploy/compute-files/README.md. compute-config: env for the compute + init
# containers (fixed tenant/timeline IDs, see 55-storage-init.yaml).
