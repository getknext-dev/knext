# knext integration: knext apps consume Postgres ONLY via a DATABASE_URL
# Secret (NextApp.spec.secrets.envMap -> SecretKeyRef). Point it at the
# gateway; the app never knows the compute sleeps.
#
# DOC-ONLY (issue #168). This file no longer SHIPS a Secret. The base
# DATABASE_URL[_RO] Secret `myapp-database` is now OWNED by deploy/gen-secrets.sh,
# which derives it from the STRONG base cloud_admin credential (Secret
# pg-base-admin) instead of the old public default `cloud_admin:cloud_admin`.
# Run `sh deploy/gen-secrets.sh` BEFORE `kubectl apply` (already the platform
# contract, see docs/getting-started.md §2) — it mints pg-base-admin AND
# myapp-database. Why: the base single-DB tier can be co-resident with the
# multi-tenant plane on a CNI without NetworkPolicy, so a literal public default
# would let any in-cluster pod become superuser on the base DB (docs/operations.md
# "Base-tier cloud_admin").
#
# In the NextApp CR (released CRD apps.kn-next.dev/v1alpha1: envMap is a MAP of
# ENV_VAR -> {secretName, secretKey}, NOT a list — issue #32):
#   spec:
#     secrets:
#       envMap:
#         DATABASE_URL:
#           secretName: myapp-database
#           secretKey: DATABASE_URL
#         DATABASE_URL_RO:            # optional read path (compute-ro / :55434)
#           secretName: myapp-database
#           secretKey: DATABASE_URL_RO
#
# The Secret shape gen-secrets.sh produces (copy it into the app's namespace in
# real use; the strong password is generated, never the literal default):
#   apiVersion: v1
#   kind: Secret
#   metadata: { name: myapp-database, namespace: scale-zero-pg }
#   type: Opaque
#   stringData:
#     # sslmode=disable: the gateway declines TLS (terminate TLS in front if needed).
#     DATABASE_URL:    "postgres://cloud_admin:<STRONG>@pggw.scale-zero-pg.svc.cluster.local:55432/postgres?sslmode=disable"
#     DATABASE_URL_RO: "postgres://cloud_admin:<STRONG>@pggw.scale-zero-pg.svc.cluster.local:55434/postgres?sslmode=disable"
#
# The strong password lives in pg-base-admin (key: password); the matching
# md5(password||"cloud_admin") is in pg-base-admin (key: CLOUD_ADMIN_MD5), which the
# base compute manifests (deploy/20/25/26) mount as a REQUIRED env so a base compute
# can never boot on the public default. To rotate: see docs/operations.md
# "Base-tier cloud_admin" (a COORDINATED rotation for a CONSUMED single-DB app).
#
# Sizing note: app maxScale x DB_POOL_MAX (knext default 5) bounds connections
# hitting the gateway; keep the app pool's idle timeout BELOW GW_IDLE_MS or
# pooled keepalives become phantom traffic that blocks scale-to-zero.
