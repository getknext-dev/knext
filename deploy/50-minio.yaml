# Object storage: bottomless history + basis for branching/PITR. MVP: single
# MinIO with a PVC; production would use real S3 or distributed MinIO.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: scale-zero-pg
  labels: { app: minio, plane: storage }
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app: minio, plane: storage }
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2022-10-20T00-55-09Z # pinned as upstream compose
          args: ["server", "/data", "--address", ":9000", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: minio }
            - { name: MINIO_ROOT_PASSWORD, value: password } # dev creds; secretize for prod
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: s3 }
            periodSeconds: 2
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: minio-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: scale-zero-pg
spec:
  accessModes: ["ReadWriteOnce"]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: scale-zero-pg
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: s3 }
    - { name: console, port: 9001, targetPort: console }
---
# One-shot bucket creation, same as the upstream compose's minio_create_buckets.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: scale-zero-pg
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set minio http://minio:9000 minio password; do
                echo 'waiting for minio...'; sleep 1;
              done
              mc mb --ignore-existing minio/neon --region=eu-north-1
