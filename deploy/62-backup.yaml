# 62-backup.yaml — backups + rehearsed restore (closes the CRITICAL "no backups
# anywhere" finding, devops-review F1).
#
# WHAT IS THE BACKUP: the durable truth of this platform is the MinIO `neon`
# bucket (pageserver layer uploads under /pageserver + safekeeper WAL offload
# under /safekeeper) PLUS the fixed tenant/timeline IDs and storage config. The
# pageserver PVC is a rebuildable cache; safekeeper PVCs hold only recent WAL
# (bounded by remote_consistent_lsn). So a faithful backup = a copy of the
# `neon` bucket + the config ConfigMaps (tenant/timeline IDs, compute/pageserver
# spec). A faithful restore = a fresh storage plane attached to a restored bucket
# copy (proven by deploy/_verify-restore.sh).
#
# NO SECRET MATERIAL LEAVES THE CLUSTER (issue #28). The config dump used to
# `kubectl get secret storage-s3-creds -o yaml` and `mc cp` it into the backup
# bucket — putting the storage-plane credentials (base64, not encrypted) at rest
# OFF-cluster, exactly the blast-radius the separate `backup-s3-target` credential
# exists to avoid. It is now EXCLUDED: `storage-s3-creds` is the MinIO root
# credential (a knob, not data) and is RE-PROVISIONED on restore by
# deploy/gen-secrets.sh (fresh MinIO gets fresh roots). The dump carries only
# ConfigMaps. The scoped Role no longer grants `secrets`.
#
# WHERE IT GOES (issue #4): OFF-CLUSTER, into OCI Object Storage over the native
# S3-compatible endpoint. This is what survives node loss / `kubectl delete pvc`
# — the whole reason the in-cluster `backup-store` MinIO PVC was retired (see the
# MIGRATION note below). The destination bucket carries VERSIONING + a LIFECYCLE
# policy (delete non-current versions > 30d).
#
# VERSIONING-AWARE PRUNING (issue #28). `mc mirror --remove` propagates live
# deletions to the OCI copy (the janitor's intentional WAL trims + pageserver GC),
# keeping it lean — but a bug/bad-actor emptying the live bucket would propagate
# into the backup too. Mitigation: --remove is passed ONLY when the destination
# bucket has VERSIONING enabled, so every propagated deletion becomes a recoverable
# non-current version (aged out by the 30-day lifecycle, NOT immediately gone). If
# versioning is somehow off, the mirror falls back to additive (no --remove) and
# warns, rather than destructively propagating without the safety net. LIMITATION
# (documented, MVP gap): retention is a mutable 30-day window with NO object-lock /
# WORM — a bucket admin can still shorten it or purge versions. See docs/operations
# .md "Backup & disaster recovery" for the deletion-propagation risk + hardening.
#
# CREDENTIALS: the `backup-s3-target` Secret (endpoint/access/secret/bucket),
# provisioned by deploy/gen-secrets.sh from an OCI Customer Secret Key. `src`
# (in-cluster MinIO) still authenticates with storage-s3-creds; `dst` (OCI OS)
# uses backup-s3-target — a SEPARATE, least-privilege credential (blast-radius).
#
# MIGRATION (backup-store retired): the old in-cluster `backup-store` MinIO
# Deployment/PVC/Service is GONE from this manifest. On a cluster that still runs
# it, delete the live objects after the first OCI backup is green:
#     kubectl -n scale-zero-pg delete deploy/backup-store svc/backup-store
#     kubectl -n scale-zero-pg delete pvc/backup-store-data
# See docs/operations.md "Backup & disaster recovery".
#
# Images pinned (no :latest). mc talks to the in-cluster MinIO and OCI OS; a
# scoped ServiceAccount (get/list on configmaps in scale-zero-pg ONLY — NOT
# secrets, issue #28) lets the kubectl step dump the config alongside the mirror.
---
# --- scoped ServiceAccount for the config dump: get/list CONFIGMAPS in
#     scale-zero-pg ONLY (no secrets — issue #28). No write, no cluster scope.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-operator
  namespace: scale-zero-pg
  labels: { app: backup, plane: backup }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-config-reader
  namespace: scale-zero-pg
rules:
  - apiGroups: [""]
    resources: ["configmaps"] # NOT secrets — no secret material leaves the cluster (issue #28)
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-operator-config-reader
  namespace: scale-zero-pg
subjects:
  - kind: ServiceAccount
    name: backup-operator
    namespace: scale-zero-pg
roleRef:
  kind: Role
  name: backup-config-reader
  apiGroup: rbac.authorization.k8s.io
---
# --- the backup pod template lives on a CronJob (scheduled) and is reused
#     on-demand by the drill via `kubectl create job --from=cronjob/backup`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup
  namespace: scale-zero-pg
  labels: { app: backup, plane: backup }
spec:
  schedule: "0 3 * * *" # daily 03:00 — mirror the neon bucket + dump config
  concurrencyPolicy: Forbid
  # issue #31: keep 6 SCHEDULED successes (≈a week of 03:00 runs) so an operator can
  # always point at recent scheduled successes for forensics. NOTE (verified on
  # k8s 1.34): `kubectl create job --from=cronjob/backup` stamps a controller
  # ownerReference to THIS CronJob, so a naive on-demand run IS owned — it counts
  # against this limit and trips `UnexpectedJob`. The documented on-demand recipe
  # therefore STRIPS ownerReferences so manual runs are standalone (not counted, no
  # UnexpectedJob) — see docs/operations.md "On demand" + "Confirming the scheduled
  # 3am backup". The headroom (6) still absorbs the occasional naive manual run.
  successfulJobsHistoryLimit: 6
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels: { app: backup, plane: backup }
        spec:
          serviceAccountName: backup-operator
          restartPolicy: OnFailure
          securityContext:
            seccompProfile: { type: RuntimeDefault }
          # STEP 1 (initContainer, kubectl, scoped SA): dump ONLY the ConfigMaps the
          # bucket alone cannot rebuild — tenant/timeline IDs, compute spec,
          # pageserver config — into a shared volume. NO SECRET is dumped (issue
          # #28): storage-s3-creds is the MinIO root credential, re-provisioned on
          # restore by deploy/gen-secrets.sh; putting it in the bucket only widened
          # the blast radius. The SA's Role no longer grants `secrets`.
          initContainers:
            - name: dump-config
              image: alpine/k8s:1.30.2 # pinned; bundles kubectl + a shell (distroless kubectl has no /bin/sh)
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  mkdir -p /dump
                  kubectl get configmap compute-config compute-files pageserver-config \
                    -o yaml > /dump/configmaps.yaml
                  echo "config dump written (ConfigMaps only — no secret material, issue #28):"; ls -l /dump
              volumeMounts:
                - { name: dump, mountPath: /dump }
          # STEP 2 (mc): mirror the neon bucket to OCI Object Storage (dst) and
          # upload the config dump alongside it, under the destination bucket's
          # neon/ and neon-config/ prefixes.
          containers:
            - name: mirror
              image: minio/mc:RELEASE.2023-01-28T20-29-38Z # pinned
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              # TENANT_ID / TIMELINE_ID / PAGESERVER_HOST for the post-mirror
              # index-integrity check (issue #21).
              envFrom:
                - configMapRef: { name: compute-config }
              env:
                # mc writes its config under $MC_CONFIG_DIR (default ~/.mc);
                # /root is not writable for this image's user, so use /tmp.
                - name: MC_CONFIG_DIR
                  value: /tmp/.mc
                # src (in-cluster MinIO) credentials
                - name: S3_USER
                  valueFrom: { secretKeyRef: { name: storage-s3-creds, key: user } }
                - name: S3_PASS
                  valueFrom: { secretKeyRef: { name: storage-s3-creds, key: password } }
                # dst (OCI Object Storage, S3-compat) credentials + target
                - name: BK_ENDPOINT
                  valueFrom: { secretKeyRef: { name: backup-s3-target, key: endpoint } }
                - name: BK_ACCESS
                  valueFrom: { secretKeyRef: { name: backup-s3-target, key: access } }
                - name: BK_SECRET
                  valueFrom: { secretKeyRef: { name: backup-s3-target, key: secret } }
                - name: BK_BUCKET
                  valueFrom: { secretKeyRef: { name: backup-s3-target, key: bucket } }
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  # mc stores its config under $HOME/.mc; this image's user cannot
                  # write /root, so anchor HOME at a writable path.
                  export HOME=/tmp
                  mkdir -p /tmp/.mc
                  mc alias set src http://minio:9000 "$S3_USER" "$S3_PASS"
                  # OCI Object Storage S3-compat: signature v4, path-style.
                  mc alias set dst "$BK_ENDPOINT" "$BK_ACCESS" "$BK_SECRET" --api S3v4 --path on
                  # VERSIONING-AWARE --remove (issue #28). --remove propagates live
                  # deletions to the OCI copy (the janitor's WAL trims + pageserver
                  # GC) so it stays lean — but a bug/bad-actor emptying src would
                  # propagate into the backup too. Guard: only pass --remove when the
                  # DESTINATION bucket has VERSIONING enabled, so every propagated
                  # deletion is a recoverable non-current version (30-day lifecycle),
                  # not an immediate loss. If versioning is off, mirror ADDITIVELY
                  # (no --remove) and warn — never destructively propagate without the
                  # version safety net. LIMITATION: retention is a mutable 30d window,
                  # no object-lock/WORM (known MVP gap; see docs/operations.md).
                  REMOVE=""
                  if mc version info "dst/$BK_BUCKET" 2>/dev/null | grep -qi enabled; then
                    REMOVE="--remove"
                    echo "dst bucket versioning ENABLED -> --remove is version-recoverable"
                  else
                    echo "WARNING: dst bucket versioning NOT enabled -> mirroring ADDITIVELY (no --remove); the OCI copy may accumulate. Enable bucket versioning to restore lean pruning (issue #28)." >&2
                  fi
                  echo "mirroring neon bucket -> OCI OS (dst/$BK_BUCKET/neon) ..."
                  # Retry the mirror: the live pageserver compacts every ~20s,
                  # deleting layer files mid-copy -> mc "ContentLength ... Body length"
                  # read errors on a large/churny bucket. mc mirror is idempotent
                  # (skips objects already copied), so a re-run fills the gaps and
                  # converges once compaction settles.
                  n=0
                  until mc mirror --overwrite $REMOVE src/neon "dst/$BK_BUCKET/neon"; do
                    n=$((n+1)); [ "$n" -gt 8 ] && { echo "mirror failed after $n attempts" >&2; exit 1; }
                    echo "mirror retry $n (transient read race) ..."; sleep 5
                  done
                  echo "uploading config dump (ConfigMaps only — no secret material, issue #28) ..."
                  mc cp /dump/configmaps.yaml "dst/$BK_BUCKET/neon-config/configmaps.yaml"
                  # --- issue #21: index_part.json can be captured mid-compaction
                  # (torn backup). The live pageserver rewrites index_part.json
                  # every ~20s of compaction; if the mirror reads it mid-PUT the
                  # backup carries a truncated index that fails to deserialize on
                  # restore. Make the backup SELF-HEALING and self-verifying: after
                  # the mirror, re-read the newest index_part.json-<gen> in the
                  # OFF-CLUSTER copy; a complete neon index is a JSON object that
                  # ends with '}'. If torn, re-copy just the index prefix from src
                  # (mc cp picks up the now-settled object) and re-verify. Fail the
                  # backup if it is still torn after several tries — a torn index
                  # must never ship (the drill's retry becomes a safety net, not
                  # the primary defense).
                  IX="neon/pageserver/tenants/${TENANT_ID}/timelines/${TIMELINE_ID}"
                  verify_index() {
                    f="$(mc ls "dst/$BK_BUCKET/$IX/" 2>/dev/null | sed 's/.* //' | grep -o 'index_part.json-[0-9]*' | sort | tail -1)"
                    [ -z "$f" ] && { echo "  no index_part.json in backup"; return 1; }
                    last="$(mc cat "dst/$BK_BUCKET/$IX/$f" 2>/dev/null | tail -c 1)"
                    [ "$last" = "}" ] && { echo "  index INTACT: $f"; return 0; }
                    echo "  index TORN (captured mid-rewrite): $f"; return 1
                  }
                  echo "verifying pageserver index integrity in the backup (issue #21) ..."
                  a=0
                  until verify_index; do
                    a=$((a+1)); [ "$a" -gt 5 ] && { echo "index still TORN after $a re-copies — failing backup (issue #21)" >&2; exit 1; }
                    echo "  re-copying index prefix from src (attempt $a) ..."
                    mc cp --recursive "src/$IX/" "dst/$BK_BUCKET/$IX/" >/dev/null 2>&1 || true
                    sleep 3
                  done
                  echo "backup complete:"; mc du "dst/$BK_BUCKET/neon"; mc ls "dst/$BK_BUCKET/neon-config"
              volumeMounts:
                - { name: dump, mountPath: /dump }
              resources:
                # mc mirror buffers many parallel object transfers at high
                # throughput; on a large (multi-GB, 256MB-layer) bucket 512Mi
                # OOMKills the client mid-copy (observed at ~18GB). 1Gi holds a
                # real production-size mirror — the backup client must survive its
                # own traffic, same lesson as the 512Mi minio bump.
                requests: { cpu: 50m, memory: 128Mi, ephemeral-storage: 100Mi }
                limits: { memory: 1Gi, ephemeral-storage: 1Gi }
          volumes:
            - name: dump
              emptyDir: {}
---
# ===========================================================================
# wal-janitor (issue #19) — bound safekeeper WAL accumulation in the live
# `neon` bucket so restore drills (and backup mirrors) stay lean.
#
# WHY THIS EXISTS. Each restore/failover drill fills ~360 MB of WAL through the
# live compute; the safekeepers offload that WAL to the bucket's /safekeeper
# prefix as their durability backup. Nothing trims it: the bucket LIFECYCLE
# policy only ages out non-current VERSIONS (not current accumulation), and
# neon's pageserver GC (`gc_horizon` / `pitr_interval`) reclaims only PAGESERVER
# LAYER files — it never touches the /safekeeper prefix (verified: with a 7-day
# PITR window and <7-day-old data, gc returns 200 and reclaims nothing, and it
# has no notion of safekeeper WAL). So /safekeeper grew to ~5.6 GB / ~360×16 MiB
# segments, inflating every cross-internet restore copy.
#
# WHAT IS SAFE TO PRUNE. A safekeeper WAL segment is dead weight once it is BOTH
# (a) below the pageserver's remote_consistent_lsn — i.e. already ingested AND
# uploaded into pageserver layers (the honesty-rule LSN) — AND (b) outside the
# window the writable restore re-seeds. deploy/_restore-writable.sh reads only a
# handful of segments around last_record_lsn ([last_record − 2 seg .. + ~1 seg]),
# so we keep KEEP_SEGMENTS (default 32 = 512 MiB) BELOW remote_consistent_lsn as
# the safety horizon — 8× the ~4 segments the restore actually needs and 2× the
# 256 MB checkpoint_distance. Everything AT or ABOVE the horizon, and every
# .partial segment (the live durability tail the safekeepers are still writing),
# is NEVER touched. Fail-closed: if remote_consistent_lsn can't be read the job
# aborts and prunes nothing.
#
# HORIZON MATH. WAL segments are 16 MiB; the object name is the 24-hex
# `<TLI><LOGID><SEG>` (256 segments per LOGID). Fixed-width hex sorts in LSN
# order, so the prune set is exactly the segment objects whose 24-hex name sorts
# strictly before the threshold name (segno(remote_consistent_lsn) − KEEP_SEGMENTS).
#
# Prune runs BEFORE the daily backup (02:30 vs 03:00) so the next `mc mirror
# --remove` propagates the trim to the OCI copy the same night.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: wal-janitor
  namespace: scale-zero-pg
  labels: { app: backup, plane: backup }
spec:
  schedule: "30 2 * * *" # daily 02:30 — 30m before the backup mirror
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels: { app: backup, plane: backup }
        spec:
          restartPolicy: OnFailure
          securityContext:
            seccompProfile: { type: RuntimeDefault }
          # STEP 1 (initContainer): read remote_consistent_lsn from the pageserver
          # and write the prune threshold (24-hex WAL segment name) to /state.
          # Fail-closed — a missing/zero rcl aborts the job before any deletion.
          initContainers:
            - name: resolve-horizon
              image: alpine/k8s:1.30.2 # bundles curl + bash (hex arithmetic)
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              envFrom:
                - configMapRef: { name: compute-config } # TENANT_ID/TIMELINE_ID/PAGESERVER_HOST
              env:
                - name: KEEP_SEGMENTS
                  value: "32" # 512 MiB of WAL kept below remote_consistent_lsn (safety horizon)
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  PS="http://${PAGESERVER_HOST}:9898"
                  mkdir -p /state/horizons

                  # rcl_to_suffix "<hi>/<lo>" -> prints the 16-hex LOGID+SEG horizon
                  # (KEEP_SEGMENTS below remote_consistent_lsn), or returns 1 if the rcl
                  # is unusable. TLI-INDEPENDENT: only the LOGID+SEG suffix is emitted;
                  # the TLI (high 8 hex of a segment name) is derived per-segment by the
                  # prune step (issue #42), never hardcoded here.
                  rcl_to_suffix() {
                    local RCL="$1" hi lo full segno keep logid seg
                    case "$RCL" in */*) : ;; *) return 1 ;; esac
                    hi=$((16#${RCL%/*})); lo=$((16#${RCL#*/}))
                    full=$(( (hi<<32) | lo ))
                    segno=$(( full / 16777216 ))            # 16 MiB WAL segments
                    keep=$(( segno - KEEP_SEGMENTS ))
                    [ "$keep" -lt 0 ] && keep=0
                    logid=$(( keep / 256 )); seg=$(( keep % 256 ))
                    printf '%08X%08X' "$logid" "$seg"
                  }

                  # PRIMARY (configured) timeline — fail-CLOSED: a missing/zero rcl aborts
                  # the whole job before any deletion (unchanged safety invariant).
                  RCL="$(curl -sf "$PS/v1/tenant/${TENANT_ID}/timeline/${TIMELINE_ID}" \
                        | tr ',' '\n' | grep '"remote_consistent_lsn"' | head -1 | cut -d'"' -f4)"
                  if ! SUF="$(rcl_to_suffix "$RCL")"; then
                    echo "FATAL: could not read remote_consistent_lsn (got '$RCL') — aborting, pruning nothing" >&2; exit 1
                  fi
                  printf '%s' "$SUF" > /state/threshold_suffix
                  printf '%s' "$SUF" > "/state/horizons/${TIMELINE_ID}"
                  echo "remote_consistent_lsn=$RCL keep_segments=$KEEP_SEGMENTS threshold_suffix=$SUF timeline=${TIMELINE_ID}"

                  # PER-TIMELINE horizons (issue #59). Neon branches are real, concurrent
                  # timelines; a sibling branch BELOW the configured timeline's rcl must be
                  # judged against ITS OWN remote_consistent_lsn, never the configured one
                  # (applying a higher horizon to a lagging sibling would over-prune WAL it
                  # still needs — data-loss class). List every timeline and resolve each
                  # one's OWN horizon. A timeline whose rcl we cannot resolve gets NO
                  # horizon file → the prune step fail-safe-SKIPS it and fails loud.
                  if LIST="$(curl -sf "$PS/v1/tenant/${TENANT_ID}/timeline")"; then
                    if command -v jq >/dev/null 2>&1; then
                      echo "$LIST" | jq -r '.[] | "\(.timeline_id) \(.remote_consistent_lsn)"' 2>/dev/null > /state/tl_rcls || : > /state/tl_rcls
                    else
                      # jq-free fallback: pair each timeline_id with the next rcl in stream order.
                      echo "$LIST" | tr ',{}' '\n' \
                        | grep -E '"(timeline_id|remote_consistent_lsn)"' \
                        | sed -E 's/.*"(timeline_id|remote_consistent_lsn)" *: *"?([^",]*)"?.*/\1 \2/' > /state/tl_kv || : > /state/tl_kv
                      : > /state/tl_rcls; tid=""
                      while read -r k v; do
                        [ "$k" = "timeline_id" ] && tid="$v"
                        if [ "$k" = "remote_consistent_lsn" ] && [ -n "$tid" ]; then echo "$tid $v" >> /state/tl_rcls; tid=""; fi
                      done < /state/tl_kv
                    fi
                    while read -r TL RCL2; do
                      [ -n "$TL" ] || continue
                      if S2="$(rcl_to_suffix "$RCL2")"; then
                        printf '%s' "$S2" > "/state/horizons/${TL}"
                        echo "resolved per-timeline horizon: timeline=$TL rcl=$RCL2 suffix=$S2"
                      else
                        echo "WARN: timeline=$TL has no usable remote_consistent_lsn ('$RCL2') — leaving UNRESOLVED (prune fail-safe-skips it)"
                      fi
                    done < /state/tl_rcls
                  else
                    echo "WARN: could not list timelines at $PS/v1/tenant/${TENANT_ID}/timeline — only the configured timeline is resolved; any sibling in the bucket is fail-safe-skipped and pages (#59)"
                  fi
              volumeMounts:
                - { name: state, mountPath: /state }
          # STEP 2 (mc): for EACH timeline prefix present under /safekeeper/<tenant>/,
          # delete every complete WAL segment whose 24-hex name sorts strictly before
          # THAT timeline's OWN horizon (issue #59 — never a foreign timeline's), with
          # the per-8-hex-TLI derivation of issue #42 applied within each timeline.
          # Excludes .partial (live tail) by construction (they don't match
          # ^[0-9A-Fa-f]{24}$). DRY_RUN=true lists only. Busybox-safe (sort + sed
          # boundary, no awk / no `<`). Fail-LOUD (exit nonzero → WalJanitorJobFailed):
          # a bucket listing that errors, OR a timeline present in the bucket whose own
          # remote_consistent_lsn STEP 1 could not resolve (skipped fail-safe so it is
          # never over-pruned, #59). Never exit 0 having silently pruned nothing (#42).
          containers:
            - name: prune
              image: minio/mc:RELEASE.2023-01-28T20-29-38Z # pinned
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              envFrom:
                - configMapRef: { name: compute-config } # TENANT_ID / TIMELINE_ID
              env:
                - name: DRY_RUN
                  value: "false" # set true for a list-only supervised preview
                - name: S3_USER
                  valueFrom: { secretKeyRef: { name: storage-s3-creds, key: user } }
                - name: S3_PASS
                  valueFrom: { secretKeyRef: { name: storage-s3-creds, key: password } }
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  export HOME=/tmp
                  mkdir -p /tmp/.mc
                  mc alias set src http://minio:9000 "$S3_USER" "$S3_PASS"
                  BASE="src/neon/safekeeper/${TENANT_ID}"
                  echo "pruning /safekeeper WAL per-timeline, each against ITS OWN horizon (issues #42/#59, DRY_RUN=${DRY_RUN})"
                  # Enumerate the timeline prefixes present in the bucket. fail-LOUD if the
                  # listing itself errors: a silent `mc ls` failure must page
                  # (WalJanitorJobFailed), never exit 0 having pruned nothing.
                  if ! mc ls "$BASE/" > /tmp/tldirs 2>/tmp/lserr; then
                    echo "FATAL: could not list $BASE (mc ls failed) — aborting, pruning nothing" >&2
                    cat /tmp/lserr >&2; exit 1
                  fi
                  sed 's/.* //' /tmp/tldirs | grep '/$' | sed 's:/$::' | sort -u > /tmp/tls || true
                  tlcount="$(grep -c . /tmp/tls || true)"
                  if [ "$tlcount" -eq 0 ]; then echo "no timeline prefixes present — nothing to prune"; exit 0; fi
                  echo "timeline prefixes present: $(tr '\n' ' ' < /tmp/tls)"

                  UNRESOLVED=""; GRAND=0; : > /tmp/anyseg
                  while IFS= read -r TL; do
                    [ -n "$TL" ] || continue
                    PFX="$BASE/$TL"
                    # #59 — a timeline we could not resolve a horizon for is SKIPPED, never
                    # judged against another timeline's horizon (fail-safe: no over-prune).
                    if [ ! -f "/state/horizons/$TL" ]; then
                      echo "  timeline $TL: UNRESOLVED horizon (its own remote_consistent_lsn is unknown) — SKIP, pruning nothing (fail-safe #59)"
                      UNRESOLVED="$UNRESOLVED $TL"; continue
                    fi
                    SUFFIX="$(cat "/state/horizons/$TL")"
                    echo "  timeline $TL: horizon suffix=$SUFFIX"
                    if ! mc ls "$PFX/" > /tmp/lsout 2>/tmp/lserr; then
                      echo "FATAL: could not list $PFX (mc ls failed) — aborting" >&2; cat /tmp/lserr >&2; exit 1
                    fi
                    # complete 16 MiB segments only (24-hex, anchored); .partial excluded by regex.
                    sed 's/.* //' /tmp/lsout | grep -E '^[0-9A-Fa-f]{24}$' | sort -u > /tmp/all || true
                    total="$(grep -c . /tmp/all || true)"
                    [ "$total" -gt 0 ] && echo x >> /tmp/anyseg
                    if [ "$total" -eq 0 ]; then echo "    no complete WAL segments — nothing to prune for $TL"; continue; fi
                    # DERIVE the 8-hex TLI(s) present and prune each against THIS timeline's
                    # suffix (issue #42): a bumped TLI (00000002...) gets its own 24-hex
                    # threshold and is actually pruned, never latch-skipped.
                    cut -c1-8 /tmp/all | sort -u > /tmp/tlis
                    : > /tmp/todelete
                    while IFS= read -r tli; do
                      [ -n "$tli" ] || continue
                      KEEP="${tli}${SUFFIX}"                  # per-(timeline,TLI) 24-hex threshold
                      grep "^${tli}" /tmp/all > /tmp/all_tli || true
                      { cat /tmp/all_tli; echo "$KEEP"; } | sort -u | sed "/^$KEEP\$/,\$d" >> /tmp/todelete
                    done < /tmp/tlis
                    sort -u /tmp/todelete -o /tmp/todelete
                    n="$(grep -c . /tmp/todelete || true)"
                    echo "    segments=$total prunable(below horizon)=$n; keep(at/above)+partials retained"
                    if [ "$n" -gt 0 ]; then echo "    range: $(head -1 /tmp/todelete) .. $(tail -1 /tmp/todelete)"; fi
                    if [ "$n" -eq 0 ]; then echo "    nothing to prune — $TL already lean"; continue; fi
                    if [ "${DRY_RUN:-false}" = "true" ]; then echo "    DRY_RUN=true — listing only, no deletions for $TL"; continue; fi
                    i=0
                    while IFS= read -r o; do
                      [ -n "$o" ] || continue
                      mc rm "$PFX/$o" >/dev/null && i=$((i+1))
                    done < /tmp/todelete
                    echo "    pruned $i segment(s) from $TL (~$((i*16)) MiB reclaimed)"
                    GRAND=$((GRAND+i))
                  done < /tmp/tls

                  echo "prune summary: $GRAND segment(s) removed across resolved timeline(s)"
                  if [ ! -s /tmp/anyseg ]; then echo "no complete WAL segments present — nothing to prune"; fi
                  if [ "$GRAND" -eq 0 ] && [ -z "$UNRESOLVED" ]; then echo "nothing to prune — bucket already lean"; fi
                  # FAIL LOUD (#59): any bucket timeline with an unresolved horizon was
                  # skipped (never over-pruned) — but the gap must page so the missing
                  # per-timeline rcl is investigated, never silently swallowed.
                  if [ -n "$UNRESOLVED" ]; then
                    echo "FATAL: timeline(s) present with UNRESOLVED horizon:$UNRESOLVED — skipped (fail-safe, no over-prune) and failing loud (WalJanitorJobFailed) (#59)" >&2
                    exit 1
                  fi
                  echo "post-prune /safekeeper size:"; mc du "src/neon/safekeeper"
              volumeMounts:
                - { name: state, mountPath: /state }
              resources:
                requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 50Mi }
                limits: { memory: 256Mi, ephemeral-storage: 256Mi }
          volumes:
            - name: state
              emptyDir: {}
