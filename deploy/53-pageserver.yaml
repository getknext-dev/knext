# Pageserver: ingests WAL from safekeepers, materializes pages, offloads to
# MinIO, serves GetPage@LSN to computes. StatefulSet + PVC (its layer cache
# and tenant metadata live under /data/.neon). Config from upstream compose,
# broker renamed storage_broker -> storage-broker (DNS-1035).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pageserver-config
  namespace: scale-zero-pg
data:
  pageserver.toml: |
    broker_endpoint='http://storage-broker:50051'
    pg_distrib_dir='/usr/local/'
    listen_pg_addr='0.0.0.0:6400'
    listen_http_addr='0.0.0.0:9898'
    remote_storage={ endpoint='http://minio:9000', bucket_name='neon', bucket_region='eu-north-1', prefix_in_bucket='/pageserver' }
    control_plane_api='http://0.0.0.0:6666' # no storage controller in the MVP; junk address
    control_plane_emergency_mode=true
    virtual_file_io_mode="buffered"
  identity.toml: |
    id=1234
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pageserver
  namespace: scale-zero-pg
  labels: { app: pageserver, plane: storage }
spec:
  serviceName: pageserver
  replicas: 1
  revisionHistoryLimit: 2 # cap StatefulSet controller-revision churn
  selector: { matchLabels: { app: pageserver } }
  template:
    metadata:
      labels: { app: pageserver, plane: storage }
    spec:
      # neon:8464 runs as uid 1000 (neon). fsGroup 1000 keeps /data writable
      # for both the seed-config initContainer and the pageserver itself.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      # Config files must live inside the writable data dir (/data/.neon),
      # so an init container seeds them from the ConfigMap onto the PVC.
      initContainers:
        - name: seed-config
          image: neondatabase/neon:8464
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          command: ["/bin/sh", "-c"]
          args:
            - mkdir -p /data/.neon && cp /config/pageserver.toml /config/identity.toml /data/.neon/
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: config, mountPath: /config }
      containers:
        - name: pageserver
          image: neondatabase/neon:8464
          command: ["/usr/local/bin/pageserver", "-D", "/data/.neon"] # image default, made explicit
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          # S3 creds from the storage-s3-creds Secret (deploy/gen-secrets.sh),
          # never plaintext YAML.
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: storage-s3-creds, key: user } }
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: storage-s3-creds, key: password } }
          ports:
            - { name: pg, containerPort: 6400 }
            - { name: http, containerPort: 9898 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /v1/status, port: http }
            periodSeconds: 2
          # Liveness: the pageserver is the single read SPOF in the MVP — a hung
          # (not crashed) process must be restarted, not left serving nothing.
          livenessProbe:
            httpGet: { path: /v1/status, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          # Memory-hungry: it materializes pages + holds a layer cache. Sized for
          # a local cluster; raise for real tenant/write volume.
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 1Gi }
      volumes:
        - name: config
          configMap: { name: pageserver-config }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: pageserver
  namespace: scale-zero-pg
spec:
  selector: { app: pageserver }
  ports:
    - { name: pg, port: 6400, targetPort: pg }
    - { name: http, port: 9898, targetPort: http }
