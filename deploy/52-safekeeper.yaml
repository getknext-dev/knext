# Safekeepers: quorum-replicated durable WAL + single-writer authority.
# THREE members — writes need a 2/3 majority ack, so losing any one pod
# neither blocks writes nor loses data. Each pod derives its unique
# safekeeper --id from its StatefulSet ordinal and advertises its stable
# per-pod DNS name. The durability layer: never scale to zero.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: safekeeper
  namespace: scale-zero-pg
  labels: { app: safekeeper, plane: storage }
spec:
  serviceName: safekeeper
  replicas: 3
  podManagementPolicy: Parallel # members are independent; no ordered start needed
  selector: { matchLabels: { app: safekeeper } }
  template:
    metadata:
      labels: { app: safekeeper, plane: storage }
    spec:
      containers:
        - name: safekeeper
          image: neondatabase/neon:8464
          command: ["/bin/sh", "-c"]
          # ordinal -> id (safekeeper ids must be unique and stable):
          # safekeeper-0 -> id 1, safekeeper-1 -> id 2, safekeeper-2 -> id 3.
          args:
            - |
              ORD=${HOSTNAME##*-}
              exec safekeeper \
                --listen-pg=0.0.0.0:5454 \
                --advertise-pg=${HOSTNAME}.safekeeper:5454 \
                --listen-http=0.0.0.0:7676 \
                --id=$((ORD + 1)) \
                --broker-endpoint=http://storage-broker:50051 \
                -D /data \
                --remote-storage="{endpoint='http://minio:9000', bucket_name='neon', bucket_region='eu-north-1', prefix_in_bucket='/safekeeper/'}"
          env:
            - { name: AWS_ACCESS_KEY_ID, value: minio }
            - { name: AWS_SECRET_ACCESS_KEY, value: password }
          ports:
            - { name: pg, containerPort: 5454 }
            - { name: http, containerPort: 7676 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /v1/status, port: http }
            periodSeconds: 2
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 2Gi } }
---
# Headless: gives each member its stable DNS name
# (safekeeper-N.safekeeper.scale-zero-pg.svc) for advertise + compute config.
apiVersion: v1
kind: Service
metadata:
  name: safekeeper
  namespace: scale-zero-pg
spec:
  clusterIP: None
  selector: { app: safekeeper }
  ports:
    - { name: pg, port: 5454, targetPort: pg }
    - { name: http, port: 7676, targetPort: http }
