# Self-hosted Neon storage plane + one native-Postgres compute — MVP shape.
#
# Derived from neondatabase/neon docker-compose/docker-compose.yml (release 8464),
# simplified for the KS-PG MVP:
#   - ONE safekeeper (reference ships 3)
#   - ONE pageserver, ONE compute
#   - images pinned to Docker Hub release tag 8464 (PG 17); never :latest
#
# Planes:
#   storage  = minio + storage_broker + safekeeper1 + pageserver   (stateful; never scale to zero)
#   compute  = native Postgres (neon compute-node-v17); stateless, cold-starts from storage
#
# Bring up:   docker compose up -d --build
# Watch:      docker compose ps
# Connect:    docker compose exec compute psql -h localhost -p 55433 -U cloud_admin postgres
# Host port:  55432 -> compute:55433  (for the gateway wired in front of it later)

x-release-tag: &tag "8464"

services:
  minio:
    restart: always
    image: quay.io/minio/minio:RELEASE.2022-10-20T00-55-09Z
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=password
    command: server /data --address :9000 --console-address ":9001"

  minio_create_buckets:
    image: minio/mc
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=password
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - "until (/usr/bin/mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD) do
             echo 'Waiting to start minio...' && sleep 1;
         done;
         /usr/bin/mc mb minio/neon --region=eu-north-1;
         exit 0;"
    depends_on:
      - minio

  storage_broker:
    restart: always
    image: neondatabase/neon:8464
    ports:
      - 50051:50051
    command:
      - "storage_broker"
      - "--listen-addr=0.0.0.0:50051"

  pageserver:
    restart: always
    image: neondatabase/neon:8464
    environment:
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=password
    ports:
      - 9898:9898 # http mgmt API (tenant/timeline)
      #- 6400:6400 # pg protocol handler (page requests) — internal only
    volumes:
      - ./pageserver_config:/data/.neon/
    depends_on:
      - storage_broker
      - minio_create_buckets

  safekeeper1:
    restart: always
    image: neondatabase/neon:8464
    environment:
      - SAFEKEEPER_ADVERTISE_URL=safekeeper1:5454
      - SAFEKEEPER_ID=1
      - BROKER_ENDPOINT=http://storage_broker:50051
      - AWS_ACCESS_KEY_ID=minio
      - AWS_SECRET_ACCESS_KEY=password
    ports:
      - 7676:7676 # http endpoints
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - "safekeeper --listen-pg=$$SAFEKEEPER_ADVERTISE_URL
                    --listen-http='0.0.0.0:7676'
                    --id=$$SAFEKEEPER_ID
                    --broker-endpoint=$$BROKER_ENDPOINT
                    -D /data
                    --remote-storage=\"{endpoint='http://minio:9000',
                                        bucket_name='neon',
                                        bucket_region='eu-north-1',
                                        prefix_in_bucket='/safekeeper/'}\""
    depends_on:
      - storage_broker
      - minio_create_buckets

  # Native Postgres compute. Stateless: on start it (a) creates the tenant+timeline
  # in the pageserver via HTTP if none exists, then (b) boots compute_ctl which
  # connects to safekeeper/pageserver and lazy-fetches pages. No local durable state.
  compute:
    restart: always
    build:
      context: ./compute_wrapper/
      args:
        - REPOSITORY=neondatabase
        - COMPUTE_IMAGE=compute-node-v17
        - TAG=8464
        - http_proxy=${http_proxy:-}
        - https_proxy=${https_proxy:-}
    image: ks-pg-compute:8464
    environment:
      - PG_VERSION=17
      - TENANT_ID=${TENANT_ID:-}
      - TIMELINE_ID=${TIMELINE_ID:-}
    volumes:
      - ./compute_wrapper/var/db/postgres/configs/:/var/db/postgres/configs/
      - ./compute_wrapper/shell/:/shell/
    ports:
      - 55432:55433 # host 55432 -> compute pg 55433
      - 3080:3080   # compute_ctl http
    entrypoint:
      - "/shell/compute.sh"
    networks:
      default:
        aliases:
          - compute1
    depends_on:
      - safekeeper1
      - pageserver
