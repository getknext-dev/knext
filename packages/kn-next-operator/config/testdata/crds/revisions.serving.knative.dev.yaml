# Minimal Knative Revision CRD fixture for envtest.
# This is a stripped-down version of the production CRD used only for
# controller unit tests — not for production deployment. The reconciler GETs
# the pinned spec.traffic.revisionName Revision (ADR-0014 follow-up), so the
# API group/kind must resolve for the check to distinguish a real NotFound
# from a missing CRD.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: revisions.serving.knative.dev
spec:
  group: serving.knative.dev
  names:
    kind: Revision
    listKind: RevisionList
    plural: revisions
    singular: revision
    shortNames:
      - rev
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
