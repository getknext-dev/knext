# Minimal KEDA ScaledObject CRD fixture for envtest.
# This is a stripped-down version of the KEDA ScaledObject CRD (keda.sh), used
# only so the controller unit tests can create/get ScaledObject objects for the
# scheduled warm-floor (ADR-0030, W5/#380). envtest does not run KEDA, so only
# the schema must exist. KEDA is OPTIONAL on real clusters — the operator emits
# the ScaledObject and it stays inert until KEDA reconciles it.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scaledobjects.keda.sh
spec:
  group: keda.sh
  names:
    kind: ScaledObject
    listKind: ScaledObjectList
    plural: scaledobjects
    singular: scaledobject
    shortNames:
      - so
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
