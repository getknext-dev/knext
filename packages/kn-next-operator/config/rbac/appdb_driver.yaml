# Scoped external-driver RBAC for unified config (ADR-0006 §3a, #119).
#
# This binds the knext operator's ServiceAccount to a NAMESPACE-SCOPED Role in the
# scale-zero-pg namespace so it can drive the AppDatabase external-driver API:
#   - create/get/list/watch/update/patch/delete AppDatabases (provision + teardown)
#   - get/list/watch the minted app-db-<app> Secret (to MIRROR the DSN into the app ns)
#
# It is deliberately a Role (NOT a ClusterRole): the knext operator gets ZERO power
# over the storage plane, the per-app computes, or any Secret other than the app-db-*
# DSNs — least privilege, and the two operators stay decoupled (ADR-0006 §5).
#
# NOT part of the default kustomize overlay because it targets the scale-zero-pg
# namespace (owned by the other repo), not the operator's own namespace. Apply it
# alongside the operator. scale-zero-pg's appdb-api lane may ship an equivalent Role
# (`knext-appdb-driver`); applying both is idempotent (last-writer-wins on identical
# rules). Adjust `namespace:` if your AppDatabases live elsewhere (see the operator's
# --database-namespace flag) and the subject SA name/namespace to match your install
# (default: kn-next-operator-controller-manager in kn-next-operator-system).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: knext-appdb-driver
  namespace: scale-zero-pg
  labels:
    app.kubernetes.io/name: kn-next-operator
    app.kubernetes.io/component: unified-config
rules:
  - apiGroups: ["apps.scale-zero-pg.dev"]
    resources: ["appdatabases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # READ the minted DSN Secret to mirror it into the app namespace. Scoped to this
  # namespace only; the operator writes the mirror copy into the app's own namespace
  # under its cluster-wide secrets grant (config/rbac/role.yaml).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: knext-appdb-driver
  namespace: scale-zero-pg
  labels:
    app.kubernetes.io/name: kn-next-operator
    app.kubernetes.io/component: unified-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: knext-appdb-driver
subjects:
  - kind: ServiceAccount
    name: kn-next-operator-controller-manager
    namespace: kn-next-operator-system
