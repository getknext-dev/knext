resources:
- manager.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
  # REAL PUBLISHED DIGEST (issue #117): the operator image is published +
  # cosign-signed (operator-supply-chain.yml succeeded on `main`), so this is the
  # real v0.1.0 digest — `kubectl apply -f dist/install.yaml` pulls a real image.
  # check-no-latest.sh requires a @sha256: digest (combined newTag form below), so
  # this passes the guard. Keep the tag and digest in ONE `newTag: <tag>@sha256:<hash>`
  # value — do NOT run `kustomize edit set image`, which splits it into bare
  # `newTag:`/`digest:` fields the guard rejects.
  # Each future operator release must re-pin this (read the new digest with):
  #   docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/getknext-dev/kn-next-operator:<tag>
images:
- name: controller
  newName: example.com/kn-next-operator
  newTag: v0.0.1
