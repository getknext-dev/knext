# Prometheus Monitor Service (Metrics)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kn-next-operator
    app.kubernetes.io/managed-by: kustomize
  name: controller-manager-metrics-monitor
  namespace: system
spec:
  endpoints:
    - path: /metrics
      port: https # Ensure this is the name of the port that exposes HTTPS metrics
      scheme: https
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        # The metrics server uses controller-runtime's self-signed certificate by
        # default (see cmd/main.go), so Prometheus skips verification for this
        # in-cluster scrape. This is acceptable for the default install; the scrape
        # is authenticated with a bearer token (above) and reaches a cluster-local
        # endpoint. For strict verification, enable cert-manager and the
        # monitor_tls_patch.yaml patch in config/prometheus/kustomization.yaml,
        # which references the 'metrics-server-cert' secret instead of skipping
        # verification. Threat model: docs/security/threat-model.md §5.
        insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kn-next-operator
