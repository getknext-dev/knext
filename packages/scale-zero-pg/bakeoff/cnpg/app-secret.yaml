# Known app credentials for the bake-off (dev only — mirrors the Neon side's
# cloud_admin/cloud_admin so the measurement harness uses one DSN shape).
# CNPG consumes this as the initdb owner secret (kubernetes.io/basic-auth).
apiVersion: v1
kind: Secret
metadata:
  name: pg-app
  namespace: bakeoff-cnpg
  labels: { app: bakeoff-cnpg }
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: app
