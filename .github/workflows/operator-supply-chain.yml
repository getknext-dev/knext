name: Operator Supply Chain

# Issue #76: publish + sign the kn-next-operator image and ship an installable bundle.
#
# Mirrors .github/workflows/supply-chain.yml (the APP image, #48): SBOM per image ·
# Trivy scan + FAIL on HIGH/CRITICAL on main (report-only on PRs) · cosign keyless
# sign + SBOM attestation. Build/scan run on every PR; push + sign only on main
# (no signing throwaway PR images).
#
# ORDERING INVARIANT (#201, same class as the app fix in #199/#200):
# build (local) → SBOM → Trivy gate → push → sign → verify → installer pin →
# release attach. The image is built into a LOCAL OCI layout and scanned
# there; it is pushed to GHCR only AFTER the Trivy HIGH/CRITICAL gate passes,
# cosign signs the digest of the image that was actually pushed, and the
# dist/install.yaml release asset bakes in that SAME post-gate pushed digest.
# A scan-failed operator image is therefore never pullable at a stable tag,
# never signed, and never referenced by the operator-latest release bundle.
# (The previous flow pushed on main at BUILD time, before the scan.)
# Guarded by tests/operator-supply-chain-workflow.test.ts.
#
# PROVENANCE RESTORE (#202): the first scan-before-push flow (#203) used the
# local `docker` exporter (load: true), which cannot carry buildkit's provenance
# attestation manifest — so provenance was dropped. Now the build exports an OCI
# layout DIRECTORY (which CAN carry the attestation), Trivy scans that exact
# layout (--input), and `crane push` publishes it byte-for-byte, preserving the
# SLSA provenance manifest. A post-push step asserts the attestation actually
# survived before anything is signed. Same gate, provenance back.
#
# Bootstrap (#76): the operator image at ghcr.io/getknext-dev/kn-next-operator does
# not exist until the FIRST push to main runs this job. Before that, the manager
# manifests carry a clearly-fake all-zeros placeholder digest (which still passes
# hack/check-no-latest.sh — that guard rejects :latest, not unreachable digests).
# After the push, the "Build installer + pin real digest" step rewrites
# dist/install.yaml with the real pushed digest and attaches it to the GitHub
# Release tagged `operator-latest`, so the README's
# releases/latest/download/install.yaml URL resolves.
#
# Path discipline (review fix): this job does NOT set a run.working-directory
# default. A job-level default only applies to `run:` steps, NOT to `uses:` action
# steps — so an action like anchore/sbom-action would write its output-file to
# $GITHUB_WORKSPACE (repo root) while a `run:` step (cosign attest) would look in the
# subdir, and the paths would silently diverge. Instead every `run:` step uses
# explicit `packages/kn-next-operator/...` paths, and the SBOM output-file is a
# single repo-root path referenced identically by upload + attest.
#
# Required permissions/secrets (documented for operators):
#   - packages: write  → push to GHCR (uses the built-in GITHUB_TOKEN)
#   - id-token: write  → cosign keyless signing via OIDC (Sigstore/Fulcio)
#   - contents: write  → create/update the GitHub Release that carries install.yaml
#   No extra repo secrets are needed; GITHUB_TOKEN is sufficient for GHCR + OIDC +
#   Releases.

on:
  pull_request:
    paths:
      - 'packages/kn-next-operator/**'
      - '.github/workflows/operator-supply-chain.yml'
  push:
    branches: [main]
    paths:
      - 'packages/kn-next-operator/**'
      - '.github/workflows/operator-supply-chain.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-image-supply-chain:
    name: Operator SBOM + Trivy (+ cosign sign on main)
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the GitHub Release that carries install.yaml
      packages: write # push to GHCR on main
      id-token: write # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner can be mixed-case.
      # ${OWNER,,} lowercases it (mirrors the app job — fixes the #48 casing bug).
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${OWNER,,}/kn-next-operator" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3

      # Build into a LOCAL OCI-layout directory on every ref — never push here.
      # The Trivy gate below scans this exact layout; publication (main only)
      # happens in the explicit crane-push step AFTER the gate. This is what
      # guarantees a scan-failed operator image is never pullable at a stable
      # tag (#201). The OCI layout — unlike the `docker` exporter used before —
      # CAN carry buildkit's provenance attestation manifest, which restores the
      # SLSA provenance dropped in #203 (#202). tar=false because Trivy's
      # --input accepts an OCI layout directory but not an OCI tarball.
      - name: Build operator image (local OCI layout — pushed after the Trivy gate)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/kn-next-operator
          file: packages/kn-next-operator/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          outputs: type=oci,dest=operator-oci,tar=false
          # mode=max records the full build definition + materials. Safe here:
          # this build takes no build-args at all, so nothing secret can be
          # recorded into the attestation.
          provenance: mode=max

      # syft cannot parse buildx's nested OCI index (the image + attestation
      # manifests are wrapped in a second index), so give it a flattened VIEW of
      # the SAME layout: symlinked blobs (identical bytes), the nested index
      # promoted to index.json with only the attestation entry dropped. The
      # image-manifest digest is unchanged, so the SBOM provably describes the
      # same image the gate scans and crane pushes. SBOM-only — the Trivy GATE
      # scans the real layout directly.
      - name: Prepare SBOM view of the OCI layout (syft can't parse nested indexes)
        run: |
          set -euo pipefail
          NESTED="$(jq -r '.manifests[0].digest' operator-oci/index.json | cut -d: -f2)"
          mkdir operator-oci-sbom
          ln -s "$(pwd)/operator-oci/blobs" operator-oci-sbom/blobs
          cp operator-oci/oci-layout operator-oci-sbom/
          jq '{schemaVersion: 2, mediaType: "application/vnd.oci.image.index.v1+json",
               manifests: [.manifests[] | select(.annotations["vnd.docker.reference.type"] != "attestation-manifest")]}' \
            "operator-oci/blobs/sha256/${NESTED}" > operator-oci-sbom/index.json

      # output-file is resolved relative to $GITHUB_WORKSPACE (repo root) for a
      # `uses:` step. This is the single canonical SBOM path; upload + attest below
      # reference the SAME path so they never diverge.
      - name: Generate SBOM (syft, SPDX-JSON)
        # SHA-pinned (#202): sbom-action runs in a job with packages:write +
        # id-token:write, so a mutable tag is a supply-chain hole. v0.24.0.
        # The oci-dir: source is passed verbatim to syft (verified against the
        # pinned action source) — the image no longer exists in the docker daemon.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: oci-dir:operator-oci-sbom
          format: spdx-json
          output-file: operator-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-sbom-${{ github.sha }}
          path: operator-sbom.spdx.json

      - name: Trivy scan — FAIL on HIGH/CRITICAL
        # Report (don't block) on PRs; ENFORCE (fail) on main. Matches the app-image
        # policy: a pre-existing base-image CVE can't block an unrelated PR, while
        # main stays gated.
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        # SHA-pinned (#202): this action is the publish GATE in a job holding
        # packages:write + id-token:write — a compromised mutable @master could
        # push/sign with this repo's OIDC identity. v0.36.0.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: operator-oci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      # ── Everything below runs ONLY after the Trivy gate passed ──────────────

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # crane pushes the OCI layout (docker push can't — the daemon store drops
      # the attestation manifest). Pinned to an exact version AND a sha256 of
      # the release tarball: crane is now on the publish path in a job holding
      # packages:write + id-token:write, the same discipline that SHA-pinned
      # trivy-action/sbom-action (#202).
      - name: Install crane (version + checksum pinned)
        if: github.ref == 'refs/heads/main'
        env:
          CRANE_VERSION: v0.21.7
          # sha256 of go-containerregistry_Linux_x86_64.tar.gz from the v0.21.7
          # release's checksums.txt (github.com/google/go-containerregistry).
          CRANE_SHA256: 1a57bc98207fa1c0d04bf760699099e26f8383499bfd55b99c1b919a928a7230
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/crane.tar.gz \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
          echo "${CRANE_SHA256}  /tmp/crane.tar.gz" | sha256sum -c -
          tar -xzf /tmp/crane.tar.gz -C /tmp crane
          sudo install -m 0755 /tmp/crane /usr/local/bin/crane
          crane version

      # Publish the EXACT bytes that were scanned: `crane push` the gated OCI
      # layout (no rebuild — a rebuild could diverge from what Trivy approved),
      # preserving the buildkit provenance manifest the docker store would drop.
      # crane prints the pushed `ref@digest` on stdout; capture it as the step
      # output that parameterizes signing, verification AND the install.yaml
      # digest pin below, and fail loud if it doesn't parse (we must never sign
      # — or bake into the release bundle — a guessed digest).
      - name: Push operator image (main only, after the Trivy gate)
        if: github.ref == 'refs/heads/main'
        id: push
        run: |
          set -euo pipefail
          PUSHED_REF="$(crane push operator-oci "${IMAGE}:${GITHUB_SHA}")"
          DIGEST="${PUSHED_REF##*@}"
          if ! printf '%s' "${DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::could not resolve the pushed digest for ${IMAGE}:${GITHUB_SHA} (crane output: ${PUSHED_REF}) — refusing to sign"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${IMAGE}@${DIGEST}"

      # The point of the OCI-layout + crane flow (#202): prove the buildkit
      # provenance attestation actually survived the push — and only sign
      # provenance-bearing images. Fails loud if the pushed index carries no
      # attestation manifest or the attestation has no SLSA provenance predicate.
      - name: Verify buildkit provenance survived the push (main only)
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          ATT_DIGEST="$(crane manifest "${IMAGE}@${DIGEST}" \
            | jq -re '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")][0].digest')" || {
            echo "::error::pushed image ${IMAGE}@${DIGEST} carries NO buildkit attestation manifest"
            exit 1
          }
          crane manifest "${IMAGE}@${ATT_DIGEST}" \
            | jq -re '[.layers[] | select(.annotations["in-toto.io/predicate-type"] | test("slsa.dev/provenance"))][0]' > /dev/null || {
            echo "::error::attestation manifest ${ATT_DIGEST} carries no SLSA provenance predicate"
            exit 1
          }
          echo "Buildkit SLSA provenance present: ${IMAGE}@${ATT_DIGEST}"

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      # No working-directory default: this `run:` step executes at repo root, so it
      # references the SAME operator-sbom.spdx.json that the sbom-action wrote there.
      - name: Sign image + attest SBOM (keyless)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate operator-sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      # Verify the signature we just produced, parameterized by the pushed digest
      # (issue #117). This proves the keyless identity/issuer round-trips before we
      # advertise the image as signed, and exercises the same hack/cosign-verify.sh
      # a client runs. The identity-regexp/issuer default to this repo's signer.
      - name: Verify operator image signature (cosign verify, main only)
        if: github.ref == 'refs/heads/main'
        env:
          IDENTITY_REGEXP: https://github.com/${{ github.repository }}/.*
          DIGEST: ${{ steps.push.outputs.digest }}
        run: bash packages/kn-next-operator/hack/cosign-verify.sh "${IMAGE}@${DIGEST}"

      # On main only: regenerate dist/install.yaml with the REAL pushed digest. This is
      # the bootstrap-resolution step — the placeholder all-zeros digest in the
      # committed manifests is replaced here with the digest cosign just signed.
      # MUST consume the POST-gate pushed digest (steps.push.outputs.digest, #201):
      # this step only runs after the Trivy gate + push + sign + verify all passed,
      # so a scan-failed run can never refresh the operator-latest release asset.
      # This `run:` step runs at repo root, so it cd's into the operator package.
      - name: Build installer + pin real digest (main only)
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          cd packages/kn-next-operator
          # Pin the real digest into the manager kustomization (single combined
          # newTag form, so hack/check-no-latest.sh stays happy), then render.
          sed -i -E \
            "s|(newTag: v[0-9]+\.[0-9]+\.[0-9]+@sha256:)[0-9a-f]{64}|\\1${DIGEST#sha256:}|" \
            config/manager/kustomization.yaml
          make build-installer
          echo "Pinned operator image digest ${DIGEST} into dist/install.yaml:"
          grep -E 'image: ghcr' dist/install.yaml
          # Gate-review advisory (#203): the bundle MUST carry the exact signed
          # digest — if the sed pattern ever stops matching (kustomization
          # format drift), a stale previously-pinned digest would ship silently.
          grep -q "${DIGEST}" dist/install.yaml || { echo "::error::dist/install.yaml does not contain the signed digest ${DIGEST}"; exit 1; }
          bash hack/check-no-latest.sh
          # PUBLISHED-CONTEXT guard (#117): now that the real digest is pinned, the
          # all-zeros bootstrap placeholder must be GONE from the rendered bundle.
          # If the re-pin silently failed we'd otherwise publish a bundle pointing at
          # a non-existent image — this fails the run instead.
          bash hack/check-published-digest.sh dist/install.yaml

      # Transient CI artifact (auth-gated) — handy for inspecting the exact bundle a
      # run produced, but NOT the user-facing install path.
      - name: Upload install.yaml artifact (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: operator-install-bundle-${{ github.sha }}
          path: packages/kn-next-operator/dist/install.yaml

      # User-facing install path (review fix): attach the digest-pinned bundle to a
      # GitHub Release so `releases/latest/download/install.yaml` resolves (the URL the
      # operator README documents). The tag is a moving `operator-latest` release that
      # is re-pointed to the current main on every publish; make_latest keeps the
      # `releases/latest/...` redirect resolving to it.
      - name: Publish install.yaml as a Release asset (main only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: operator-latest
          name: kn-next-operator (latest)
          make_latest: "true"
          files: packages/kn-next-operator/dist/install.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
