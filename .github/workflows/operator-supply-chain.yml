name: Operator Supply Chain

# Issue #76: publish + sign the kn-next-operator image and ship an installable bundle.
#
# Mirrors .github/workflows/supply-chain.yml (the APP image, #48): SBOM per image ·
# Trivy scan + FAIL on HIGH/CRITICAL on main (report-only on PRs) · cosign keyless
# sign + SBOM attestation. Build/scan run on every PR; push + sign only on main
# (no signing throwaway PR images).
#
# Bootstrap (#76): the operator image at ghcr.io/getknext-dev/kn-next-operator does
# not exist until the FIRST push to main runs this job. Before that, the manager
# manifests carry a clearly-fake all-zeros placeholder digest (which still passes
# hack/check-no-latest.sh — that guard rejects :latest, not unreachable digests).
# After the push, the "Build installer + pin real digest" step rewrites
# dist/install.yaml with the real pushed digest and uploads it as a release artifact.
#
# Required permissions/secrets (documented for operators):
#   - packages: write  → push to GHCR (uses the built-in GITHUB_TOKEN)
#   - id-token: write  → cosign keyless signing via OIDC (Sigstore/Fulcio)
#   No extra repo secrets are needed; GITHUB_TOKEN is sufficient for GHCR + OIDC.

on:
  pull_request:
    paths:
      - 'packages/kn-next-operator/**'
      - '.github/workflows/operator-supply-chain.yml'
  push:
    branches: [main]
    paths:
      - 'packages/kn-next-operator/**'
      - '.github/workflows/operator-supply-chain.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  operator-image-supply-chain:
    name: Operator SBOM + Trivy (+ cosign sign on main)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kn-next-operator
    permissions:
      contents: read
      packages: write # push to GHCR on main
      id-token: write # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner can be mixed-case.
      # ${OWNER,,} lowercases it (mirrors the app job — fixes the #48 casing bug).
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${OWNER,,}/kn-next-operator" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On PRs: build + load locally for scanning (no push).
      # On main: build + push by digest so we can sign the exact pushed image.
      - name: Build operator image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/kn-next-operator
          file: packages/kn-next-operator/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          load: ${{ github.ref != 'refs/heads/main' }}
          push: ${{ github.ref == 'refs/heads/main' }}
          # provenance emits a manifest list the `load` (docker) exporter can't handle,
          # so only attach it on the push/main path (registry exporter). (#48 fix.)
          provenance: ${{ github.ref == 'refs/heads/main' }}

      - name: Generate SBOM (syft, SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: operator-sbom-${{ github.sha }}
          path: packages/kn-next-operator/sbom.spdx.json

      - name: Trivy scan — FAIL on HIGH/CRITICAL
        # Report (don't block) on PRs; ENFORCE (fail) on main. Matches the app-image
        # policy: a pre-existing base-image CVE can't block an unrelated PR, while
        # main stays gated.
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        # @master resolves reliably; pin to a release SHA as a supply-chain follow-up.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image + attest SBOM (keyless)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      # On main only: regenerate dist/install.yaml with the REAL pushed digest and
      # upload it as the installable bundle. This is the bootstrap-resolution step —
      # the placeholder all-zeros digest in the committed manifests is replaced here
      # with the digest cosign just signed.
      - name: Build installer + pin real digest (main only)
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Pin the real digest into the manager kustomization (single combined
          # newTag form, so hack/check-no-latest.sh stays happy), then render.
          sed -i -E \
            "s|(newTag: v[0-9]+\.[0-9]+\.[0-9]+@sha256:)[0-9a-f]{64}|\\1${DIGEST#sha256:}|" \
            config/manager/kustomization.yaml
          make build-installer
          echo "Pinned operator image digest ${DIGEST} into dist/install.yaml:"
          grep -E 'image: ghcr' dist/install.yaml
          bash hack/check-no-latest.sh

      - name: Upload install.yaml bundle (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: operator-install-bundle-${{ github.sha }}
          path: packages/kn-next-operator/dist/install.yaml
