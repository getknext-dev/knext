name: Bun sandbox fetch A/B (investigation)

# ─────────────────────────────────────────────────────────────────────────────
# docs/compat/upstream-bun-sandbox-fetch-bug.md — path 1 to fileability:
# "move the A/B where the discrimination already exists".
#
# The compat lane's bun runtime fails `middleware-fetches-with-any-http-method`
# 6/6 runs (incl. Bun 1.4.0 canary) while the node lane is green on identical
# infra — but every LOCAL repro attempt hangs under node too (WAN + docker
# networking confounds), so there is no fileable upstream evidence yet. This
# workflow reruns the doc's minimal repro app on GHA-hosted ubuntu runners
# (where the lane discrimination was observed) against a CONTROLLED LOCAL HTTPS
# echo server (self-signed CA via NODE_EXTRA_CA_CERTS — no WAN, no docker
# port-forwarding), N fresh-boot trials per runtime, and aggregates per-shape
# hang rates into an A/B table.
#
# THE DISCRIMINATION CRITERION (also encoded in aggregate.mjs, guard-tested):
# file-worthy iff bun hangs at a materially higher rate than node under
# identical local-echo conditions — some shape with bun >= 50% hangs while
# node <= 5%. Otherwise the CI-lane divergence is environmental / Next-level,
# not a fileable Bun bug, and the doc records that honestly.
#
# DISPATCH-ONLY by design: this is an INVESTIGATION TOOL, not a gate or a
# monitor. No schedule — guard-tested in
# tests/bun-sandbox-fetch-ab-workflow.test.ts. Cheap: 2 jobs, one fixture
# build each, default 10 trials x 4 probes x <=15s.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      trials:
        description: 'Fresh-server-boot trials per runtime (4 probe shapes each)'
        required: false
        type: string
        default: '10'
      bun-version:
        description: 'Bun version for the bun lane (oven-sh/setup-bun spec). Default = the compat lane pinned stable that produced the 6/6 red record.'
        required: false
        type: string
        default: '1.3.14'

permissions:
  contents: read

jobs:
  probe:
    name: Probe (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # Both lanes must finish — the A/B table is the entire point.
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - name: Checkout knext
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun (bun lane only)
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ github.event.inputs.bun-version || '1.3.14' }}

      - name: Build fixture (once per job)
        working-directory: test/bun-sandbox-fetch-ab/fixture
        run: |
          npm install --no-audit --no-fund
          npx next build

      # The probe client, the trial driver, and the local HTTPS echo server ALL
      # run under node in BOTH lanes — the serving runtime (node|bun booting the
      # standalone server.js) is the ONLY variable across the matrix.
      # The dispatch input reaches the shell via env indirection only (GHA
      # injection hardening — never template untrusted input into run:).
      # run-trials.mjs validates it as an integer >= 1 and fails loud otherwise.
      - name: Run trials
        env:
          TRIALS: ${{ github.event.inputs.trials || '10' }}
        run: |
          node test/bun-sandbox-fetch-ab/run-trials.mjs \
            --runtime "${{ matrix.runtime }}" \
            --trials "$TRIALS" \
            --fixture test/bun-sandbox-fetch-ab/fixture \
            --out "ab-results-${{ matrix.runtime }}.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ab-results-${{ matrix.runtime }}
          path: ab-results-${{ matrix.runtime }}.json
          retention-days: 30

  aggregate:
    name: A/B table + verdict
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout knext
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: ab-results-*
          merge-multiple: true

      - name: Aggregate A/B table into the run summary
        run: |
          node test/bun-sandbox-fetch-ab/aggregate.mjs \
            --node ab-results-node.json \
            --bun ab-results-bun.json | tee ab-verdict.md
          cat ab-verdict.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload verdict
        uses: actions/upload-artifact@v4
        with:
          name: ab-verdict
          path: ab-verdict.md
          retention-days: 30
