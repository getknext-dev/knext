name: Supply Chain

# B2 (security.md "Supply chain — the open security milestone"):
# SBOM per image · scan + FAIL on HIGH/CRITICAL · sign (cosign keyless) + SBOM attestation.
# Build/scan run on every PR; push + sign only on main (no signing throwaway PR images).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image-supply-chain:
    name: SBOM + Trivy (+ cosign sign on main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR on main
      id-token: write # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner can be mixed-case.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${OWNER,,}/file-manager" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3

      # Reproducible-build inputs: pin SOURCE_DATE_EPOCH to the commit time so
      # buildkit can rewrite layer timestamps deterministically (below). This is a
      # best-effort step toward reproducibility — NOT a full guarantee (npm/pnpm
      # install ordering and native sharp prebuilts can still vary). The honest
      # status is documented in docs/security/threat-model.md (supply chain).
      - name: Compute SOURCE_DATE_EPOCH (commit time)
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On PRs: build + load locally for scanning (no push).
      # On main: build + push by digest so we can sign the exact pushed image.
      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/file-manager/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          load: ${{ github.ref != 'refs/heads/main' }}
          push: ${{ github.ref == 'refs/heads/main' }}
          # provenance emits a manifest list the `load` (docker) exporter can't handle,
          # so only attach it on the push/main path (registry exporter).
          provenance: ${{ github.ref == 'refs/heads/main' }}
          # Reproducible-build best effort: pass SOURCE_DATE_EPOCH (commit time) so a
          # future timestamp-rewriting build can be deterministic. We deliberately do
          # NOT yet claim fully reproducible builds — pnpm/npm install ordering and
          # native sharp prebuilts still vary. Honest status + the path to enabling
          # buildkit `rewrite-timestamp` is in docs/security/threat-model.md.
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      - name: Generate SBOM (syft, SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      - name: Trivy scan — FAIL on HIGH/CRITICAL
        # Report (don't block) on PRs; ENFORCE (fail) on main. Phased rollout so a
        # pre-existing base-image CVE can't block an unrelated PR, while main stays gated.
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        # @master resolves reliably; pin to a release SHA as a supply-chain follow-up.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image + attest SBOM (keyless)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      # Verify the signature we just produced, parameterized by the pushed digest.
      # Mirrors the operator's verify step (operator-supply-chain.yml): it proves the
      # keyless identity/issuer round-trips before we advertise the app image as
      # signed, and exercises the same hack/cosign-verify.sh a client would run.
      # The identity-regexp/issuer default to this repo's signer.
      - name: Verify app image signature (cosign verify, main only)
        if: github.ref == 'refs/heads/main'
        env:
          IDENTITY_REGEXP: https://github.com/${{ github.repository }}/.*
          DIGEST: ${{ steps.build.outputs.digest }}
        run: bash apps/file-manager/hack/cosign-verify.sh "${IMAGE}@${DIGEST}"
