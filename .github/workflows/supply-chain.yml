name: Supply Chain

# B2 (security.md "Supply chain — the open security milestone"):
# SBOM per image · scan + FAIL on HIGH/CRITICAL · sign (cosign keyless) + SBOM attestation.
# Build/scan run on every PR; push + sign only on main (no signing throwaway PR images).
#
# ORDERING INVARIANT (#199): build (local) → SBOM → Trivy gate → push → sign → verify.
# The image is built into a LOCAL OCI layout and scanned there; it is pushed to
# GHCR only AFTER the Trivy HIGH/CRITICAL gate passes, and cosign signs the digest of
# the image that was actually pushed. A scan-failed image is therefore never pullable
# at a stable tag and never signed. (The previous flow pushed on main BEFORE the scan,
# so a Trivy failure left an unscanned, UNSIGNED digest as the newest published
# file-manager image.) Guarded by tests/supply-chain-workflow.test.ts.
#
# PROVENANCE RESTORE (#202): the first scan-before-push flow (#200) used the local
# `docker` exporter (load: true), which cannot carry buildkit's provenance
# attestation manifest — so provenance was dropped. Now the build exports an OCI
# layout DIRECTORY (which CAN carry the attestation), Trivy scans that exact
# layout (--input), and `crane push` publishes it byte-for-byte, preserving the
# SLSA provenance manifest. A post-push step asserts the attestation actually
# survived before anything is signed. Same gate, provenance back.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image-supply-chain:
    name: SBOM + Trivy (+ cosign sign on main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR on main
      id-token: write # cosign keyless signing via OIDC
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner can be mixed-case.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${OWNER,,}/file-manager" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - uses: docker/setup-buildx-action@v3

      # Reproducible-build inputs: pin SOURCE_DATE_EPOCH to the commit time so
      # buildkit can rewrite layer timestamps deterministically (below). This is a
      # best-effort step toward reproducibility — NOT a full guarantee (npm/pnpm
      # install ordering and native sharp prebuilts can still vary). The honest
      # status is documented in docs/security/threat-model.md (supply chain).
      - name: Compute SOURCE_DATE_EPOCH (commit time)
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      # Build into a LOCAL OCI-layout directory on every ref — never push here.
      # The Trivy gate below scans this exact layout; publication (main only)
      # happens in the explicit crane-push step AFTER the gate. This is what
      # guarantees a scan-failed image is never pullable at a stable tag (#199).
      # The OCI layout — unlike the `docker` exporter used before — CAN carry
      # buildkit's provenance attestation manifest, which restores the SLSA
      # provenance dropped in #200 (#202). tar=false because Trivy's --input
      # accepts an OCI layout directory but not an OCI tarball.
      - name: Build image (local OCI layout — pushed after the Trivy gate)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/file-manager/Dockerfile
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          outputs: type=oci,dest=image-oci,tar=false
          # mode=max records the full build definition + materials. Safe here:
          # this build takes no secret build-args (only SOURCE_DATE_EPOCH, which
          # is the public commit time — verified in the local evidence run for
          # #202: the recorded externalParameters args contain exactly that).
          provenance: mode=max
          # Reproducible-build best effort: pass SOURCE_DATE_EPOCH (commit time) so a
          # future timestamp-rewriting build can be deterministic. We deliberately do
          # NOT yet claim fully reproducible builds — pnpm/npm install ordering and
          # native sharp prebuilts still vary. Honest status + the path to enabling
          # buildkit `rewrite-timestamp` is in docs/security/threat-model.md.
          build-args: |
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

      # syft cannot parse buildx's nested OCI index (the image + attestation
      # manifests are wrapped in a second index), so give it a flattened VIEW of
      # the SAME layout: symlinked blobs (identical bytes), the nested index
      # promoted to index.json with only the attestation entry dropped. The
      # image-manifest digest is unchanged, so the SBOM provably describes the
      # same image the gate scans and crane pushes. SBOM-only — the Trivy GATE
      # scans the real layout directly.
      - name: Prepare SBOM view of the OCI layout (syft can't parse nested indexes)
        run: |
          set -euo pipefail
          NESTED="$(jq -r '.manifests[0].digest' image-oci/index.json | cut -d: -f2)"
          mkdir image-oci-sbom
          ln -s "$(pwd)/image-oci/blobs" image-oci-sbom/blobs
          cp image-oci/oci-layout image-oci-sbom/
          jq '{schemaVersion: 2, mediaType: "application/vnd.oci.image.index.v1+json",
               manifests: [.manifests[] | select(.annotations["vnd.docker.reference.type"] != "attestation-manifest")]}' \
            "image-oci/blobs/sha256/${NESTED}" > image-oci-sbom/index.json

      - name: Generate SBOM (syft, SPDX-JSON)
        # SHA-pinned (#202): sbom-action runs in a job with packages:write +
        # id-token:write, so a mutable tag is a supply-chain hole. v0.24.0.
        # The oci-dir: source is passed verbatim to syft (verified against the
        # pinned action source) — the image no longer exists in the docker daemon.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: oci-dir:image-oci-sbom
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      - name: Trivy scan — FAIL on HIGH/CRITICAL
        # Report (don't block) on PRs; ENFORCE (fail) on main. Phased rollout so a
        # pre-existing base-image CVE can't block an unrelated PR, while main stays gated.
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        # SHA-pinned (#202): this action is the publish GATE in a job holding
        # packages:write + id-token:write — a compromised mutable @master could
        # push/sign with this repo's OIDC identity. v0.36.0.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          input: image-oci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

      # ── Everything below runs ONLY after the Trivy gate passed ──────────────

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # crane pushes the OCI layout (docker push can't — the daemon store drops
      # the attestation manifest). Pinned to an exact version AND a sha256 of
      # the release tarball: crane is now on the publish path in a job holding
      # packages:write + id-token:write, the same discipline that SHA-pinned
      # trivy-action/sbom-action (#202).
      - name: Install crane (version + checksum pinned)
        if: github.ref == 'refs/heads/main'
        env:
          CRANE_VERSION: v0.21.7
          # sha256 of go-containerregistry_Linux_x86_64.tar.gz from the v0.21.7
          # release's checksums.txt (github.com/google/go-containerregistry).
          CRANE_SHA256: 1a57bc98207fa1c0d04bf760699099e26f8383499bfd55b99c1b919a928a7230
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/crane.tar.gz \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
          echo "${CRANE_SHA256}  /tmp/crane.tar.gz" | sha256sum -c -
          tar -xzf /tmp/crane.tar.gz -C /tmp crane
          sudo install -m 0755 /tmp/crane /usr/local/bin/crane
          crane version

      # Publish the EXACT bytes that were scanned: `crane push` the gated OCI
      # layout (no rebuild — a rebuild could diverge from what Trivy approved),
      # preserving the buildkit provenance manifest the docker store would drop.
      # crane prints the pushed `ref@digest` on stdout; capture it as the step
      # output that parameterizes signing + verification below and fail loud if
      # it doesn't parse (we must never sign a guessed digest).
      - name: Push image (main only, after the Trivy gate)
        if: github.ref == 'refs/heads/main'
        id: push
        run: |
          set -euo pipefail
          PUSHED_REF="$(crane push image-oci "${IMAGE}:${GITHUB_SHA}")"
          DIGEST="${PUSHED_REF##*@}"
          if ! printf '%s' "${DIGEST}" | grep -Eq '^sha256:[0-9a-f]{64}$'; then
            echo "::error::could not resolve the pushed digest for ${IMAGE}:${GITHUB_SHA} (crane output: ${PUSHED_REF}) — refusing to sign"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${IMAGE}@${DIGEST}"

      # The point of the OCI-layout + crane flow (#202): prove the buildkit
      # provenance attestation actually survived the push — and only sign
      # provenance-bearing images. Fails loud if the pushed index carries no
      # attestation manifest or the attestation has no SLSA provenance predicate.
      - name: Verify buildkit provenance survived the push (main only)
        if: github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          ATT_DIGEST="$(crane manifest "${IMAGE}@${DIGEST}" \
            | jq -re '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")][0].digest')" || {
            echo "::error::pushed image ${IMAGE}@${DIGEST} carries NO buildkit attestation manifest"
            exit 1
          }
          crane manifest "${IMAGE}@${ATT_DIGEST}" \
            | jq -re '[.layers[] | select(.annotations["in-toto.io/predicate-type"] | test("slsa.dev/provenance"))][0]' > /dev/null || {
            echo "::error::attestation manifest ${ATT_DIGEST} carries no SLSA provenance predicate"
            exit 1
          }
          echo "Buildkit SLSA provenance present: ${IMAGE}@${ATT_DIGEST}"

      - name: Install cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3

      - name: Sign image + attest SBOM (keyless)
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      # Verify the signature we just produced, parameterized by the pushed digest.
      # Mirrors the operator's verify step (operator-supply-chain.yml): it proves the
      # keyless identity/issuer round-trips before we advertise the app image as
      # signed, and exercises the same hack/cosign-verify.sh a client would run.
      # The identity-regexp/issuer default to this repo's signer.
      - name: Verify app image signature (cosign verify, main only)
        if: github.ref == 'refs/heads/main'
        env:
          IDENTITY_REGEXP: https://github.com/${{ github.repository }}/.*
          DIGEST: ${{ steps.push.outputs.digest }}
        run: bash apps/file-manager/hack/cosign-verify.sh "${IMAGE}@${DIGEST}"
