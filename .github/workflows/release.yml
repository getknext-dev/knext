# Release (changesets) — E1-1
#
# Gated: no publish occurs until NPM_TOKEN is set as a repo secret (E1-4, user step).
# Until then this workflow only ever opens/updates the "Version Packages" PR — it never
# runs `changeset publish`. The publish gate is computed in a plain `run` step (see
# "Determine publish gate") rather than a `secrets`-in-`with:` expression, which GitHub
# rejected during workflow evaluation and produced phantom startup-failure runs.
#
# Flow:
#   1. A normal feature PR includes a changeset (.changeset/*.md).
#   2. On merge to main, changesets/action opens a "Version Packages" PR (version bump + changelog).
#   3. Merging that PR (a second push to main) runs `changeset publish` IF NPM_TOKEN exists.
#
# Publishable packages: @knext/core (packages/kn-next), @knext/lib (packages/lib),
# @knext/db (packages/db) — core depends on lib AND db, db depends on lib; all
# three must ship together or consumers 404 on the missing member (#255/#256).
# Provenance is enabled via each package's publishConfig.provenance + id-token permission.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance (--provenance)

jobs:
  # npm/JS supply-chain gate (v4-P3). The image Trivy gate scans containers; this
  # scans the PUBLISHED npm tarballs' PRODUCTION closure (--omit=dev) of
  # @knext/{core,lib,db}, FAILS on HIGH/CRITICAL (mirrors security.md's Trivy
  # rule), and emits a CycloneDX SBOM per package. It is PUBLISH-BLOCKING: the
  # `release` job `needs: audit`, so a failed audit stops the publish — never
  # advisory/after. scripts/audit-published.mjs is the single source of truth for
  # scope + audit-level; the dated+justified allowlist is security/npm-audit-allowlist.json.
  audit:
    name: npm supply-chain audit + JS SBOM (blocks publish)
    runs-on: ubuntu-latest
    if: github.repository == 'getknext-dev/knext'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build in dependency order so the packed tarballs carry real dist/ (lib →
      # db → core) — audit-published.mjs pnpm-packs each (rewriting workspace:^
      # exactly like changeset publish) and audits the resolved prod closure.
      - name: Build publishable packages
        run: pnpm --filter @knext/lib build && pnpm --filter @knext/db build && pnpm --filter @knext/core build

      # Audits the PUBLISHED production closure (--omit=dev, HIGH/CRITICAL) and
      # writes sbom/*.cdx.json. Non-zero exit here fails the job → blocks publish.
      - name: Audit published production closure + generate SBOMs
        run: node scripts/audit-published.mjs

      - name: Upload JS SBOMs (CycloneDX)
        uses: actions/upload-artifact@v4
        with:
          name: npm-sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  release:
    name: Version PR / Publish (gated on NPM_TOKEN)
    runs-on: ubuntu-latest
    # Publish-BLOCKING supply-chain gate: never publish tarballs the audit did
    # not clear (HIGH/CRITICAL fail-closed). This does NOT unblock #53 — publish
    # still requires the human NPM_TOKEN (see "Determine publish gate" below).
    needs: audit
    # Belt-and-suspenders: only ever run on the canonical repo (never forks).
    if: github.repository == 'getknext-dev/knext'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build in dependency order: @knext/lib, then @knext/db (depends on lib and
      # holds the `kn-next db migrate` runner, #242), then @knext/core (type-imports
      # both). @knext/lib/@knext/db ship only dist/, so they must build first.
      - name: Build publishable packages
        run: pnpm --filter @knext/lib build && pnpm --filter @knext/db build && pnpm --filter @knext/core build

      # Gate the publish command WITHOUT referencing `secrets` inside the action's
      # `with:` input (that expression caused GitHub startup-failure runs). When
      # NPM_TOKEN is unset, `publish` is empty → changesets/action can only open the
      # Version PR (nothing destructive).
      - name: Determine publish gate
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "publish=pnpm run release" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN present — publish path enabled."
          else
            echo "publish=" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN not set — publish gated off (E1-4, user step). Only the Version PR path will run."
          fi

      # Opens/updates the "Version Packages" PR, OR publishes when there are
      # already-versioned packages to release AND the publish gate is enabled.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          publish: ${{ steps.gate.outputs.publish }}
          commit: 'chore: version packages'
          title: 'chore: version packages'
          # On publish, create one GitHub Release per published package, tagged
          # `@knext/<pkg>@x.y.z`. The hand-made `v0.1.0` release predates this and
          # uses a different tag format, so there is no tag collision.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
