name: Operator E2E (nightly / dispatch)

# Layer 2 of the scale-to-zero suite (build tag `e2e_scale`) — the REAL invariants
# on a live kind + Knative cluster. `make test-e2e-scale` runs ALL e2e_scale
# specs, so this one job now covers BOTH:
#   - A2-2 (#38): bytecode cache SURVIVES a scale-to-zero cycle
#     (test/e2e/scale_to_zero_cache_test.go)
#   - A2-3 (#39): a minScale:0 app idles to 0 replicas then a request through the
#     Knative activator wakes a pod and returns 200
#     (test/e2e/scale_from_zero_test.go)
# The operator is deployed once for the whole suite (test/e2e/scale_suite_test.go).
#
# Deliberately NOT in ci.yml: it needs a persistent kind cluster with Knative
# Serving (scale-to-zero) + (for #38) an RWO PVC bound across a scale cycle, and
# the timing sits within PR-CI noise. The per-PR gates that prove the mechanisms
# are deterministic: the vitest test apps/file-manager/bytecode-cache-reuse.test.ts
# (#38) and the envtest min-scale:0/max-scale:1 assertion in
# internal/controller/reconcile_output_test.go (#39).
#
# Triggers: nightly schedule + manual workflow_dispatch only.
#
# NOTE (#59 dependency): the spec's load-bearing assertions (warm_start==1 and a
# stable PVC file count after cold start) only hold once the operator wires
# `cache.enableBytecodeCache: true` into a PVC mounted at NODE_COMPILE_CACHE.
# Until #59 lands, this workflow will run but the scale-to-zero cache assertions
# are expected to fail — that is why it is nightly/dispatch and gates nothing.

on:
  schedule:
    # 03:17 UTC daily — off-peak, avoids top-of-hour runner contention.
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      scale_test_image:
        description: 'Digest-pinned file-manager image to deploy (overrides SCALE_TEST_IMAGE).'
        required: false
        type: string

permissions:
  contents: read

jobs:
  scale-to-zero-cache:
    name: scale-to-zero suite — cache (#38) + activation (#39) (e2e_scale)
    runs-on: ubuntu-latest
    # The real invariant can be flaky on shared runners (Knative install + scale
    # timing); never let a nightly hiccup page anyone. Failures are reviewed, not
    # gating.
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache-dependency-path: packages/kn-next-operator/go.sum

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name kn-next-operator-test-e2e --wait 120s

      - name: Install Knative Serving (scale-to-zero)
        # The config-autoscaler patch below (scale-to-zero-pod-retention-period:0s,
        # short stable-window) is what makes BOTH the #38 cache spec and the #39
        # activation spec observe a true cold start in this single job — scale
        # timing is cluster config, not the NextApp CR.
        run: |
          set -euo pipefail
          KNATIVE_VERSION="knative-v1.16.0"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-crds.yaml"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-core.yaml"
          kubectl apply -f "https://github.com/knative/net-kourier/releases/download/${KNATIVE_VERSION}/kourier.yaml"
          kubectl patch configmap/config-network \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
          # scale-to-zero with no retention so the spec observes a true cold start.
          kubectl patch configmap/config-autoscaler \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"scale-to-zero-pod-retention-period":"0s","stable-window":"6s"}}'
          kubectl wait --for=condition=Available --timeout=300s \
            -n knative-serving deployment/controller deployment/webhook deployment/autoscaler

      # SCALE_TEST_IMAGE MUST be a real, pullable, digest-pinned file-manager image
      # that serves /api/health (the #39 activation spec asserts an HTTP 200 from a
      # woken pod; #38 scrapes /api/metrics). The in-code default in
      # test/e2e/scale_*_test.go is an all-zeros placeholder digest that is
      # DELIBERATELY UNPULLABLE — if it ever reaches the cluster the ksvc never
      # becomes Ready (ErrImagePull) and the specs fail at "ksvc not Ready". So this
      # step FAILS FAST with a clear message when no image is provided, rather than
      # burning 5 minutes on a BeforeSuite timeout.
      #   - workflow_dispatch: pass the digest via the `scale_test_image` input.
      #   - schedule (nightly): set the repo/org variable `vars.SCALE_TEST_IMAGE`
      #     to a freshly built+pushed file-manager digest (a publish job should
      #     update it), or this run is skipped with a clear log line.
      - name: Resolve SCALE_TEST_IMAGE
        id: scale_image
        run: |
          set -euo pipefail
          img="${{ inputs.scale_test_image || vars.SCALE_TEST_IMAGE }}"
          if [ -z "$img" ]; then
            echo "::warning::No SCALE_TEST_IMAGE provided (dispatch input empty and vars.SCALE_TEST_IMAGE unset)."
            echo "The scale e2e specs need a real, pullable, digest-pinned file-manager image that serves /api/health."
            echo "Skipping the scale e2e run for this trigger."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Using SCALE_TEST_IMAGE=$img"
            echo "image=$img" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scale-to-zero e2e suite (cache #38 + activation #39)
        if: steps.scale_image.outputs.skip != 'true'
        working-directory: packages/kn-next-operator
        env:
          KIND_CLUSTER: kn-next-operator-test-e2e
          CERT_MANAGER_INSTALL_SKIP: 'true'
          SCALE_TEST_IMAGE: ${{ steps.scale_image.outputs.image }}
        run: make test-e2e-scale

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name kn-next-operator-test-e2e || true

  # CLI e2e (build tag `e2e_cli`): the REAL built kn-next CLI (plain Node — no
  # Bun) runs `doctor`, `db bind`, and `status` against a live kind + Knative +
  # operator cluster (test/e2e/cli_e2e_test.go). This is the first non-hermetic
  # exercise of the CLI's cluster-facing commands: the unit suites stub kubectl,
  # so until this job NOTHING proved the doctor checks, the db-bind merge-patch +
  # silent-prune verify-read, or the status exit-code contract against a real
  # apiserver/CRD schema.
  #
  # INDEPENDENT of the scale suite (own kind cluster, own job) so a scale flake
  # never blocks it. Deliberately NO continue-on-error: unlike the scale suite it
  # has no cold-start timing sensitivity — the app image is a deterministic
  # unpullable placeholder and every assertion is state-based, so a failure here
  # is signal, not noise.
  cli-e2e:
    name: kn-next CLI doctor/db bind/status against kind (e2e_cli)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache-dependency-path: packages/kn-next-operator/go.sum

      # The suite shells out to the built CLI with plain `node` and builds it
      # via `pnpm --filter @knext/core build` — so the job needs Node + pnpm
      # (version pinned by `packageManager` in package.json) + workspace deps.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name kn-next-operator-test-e2e --wait 120s

      - name: Install cert-manager (operator webhook certs)
        run: |
          set -euo pipefail
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=300s \
            -n cert-manager deployment/cert-manager deployment/cert-manager-webhook deployment/cert-manager-cainjector

      - name: Install Knative Serving + Kourier
        # The config-network ingress-class patch matters twice here: it is what
        # lets routes program at all AND it is the exact misconfiguration the
        # doctor #208 check exists to catch — patched correctly, the suite
        # asserts doctor reports the ingress check as healthy.
        run: |
          set -euo pipefail
          KNATIVE_VERSION="knative-v1.16.0"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-crds.yaml"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-core.yaml"
          kubectl apply -f "https://github.com/knative/net-kourier/releases/download/${KNATIVE_VERSION}/kourier.yaml"
          kubectl patch configmap/config-network \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
          kubectl wait --for=condition=Available --timeout=300s \
            -n knative-serving deployment/controller deployment/webhook deployment/autoscaler
          kubectl wait --for=condition=Available --timeout=300s \
            -n knative-serving deployment/net-kourier-controller

      - name: Run CLI e2e suite (doctor / db bind / status)
        working-directory: packages/kn-next-operator
        env:
          KIND_CLUSTER: kn-next-operator-test-e2e
        run: make test-e2e-cli

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name kn-next-operator-test-e2e || true

  # Rollback e2e (build tag `e2e_rollback`): the ROADMAP Tier-B exit criterion
  # "rollback demoed", proven end-to-end (test/e2e/rollback_e2e_test.go). The
  # REAL built kn-next CLI patches ONLY the NextApp CR's spec.traffic
  # (ADR-0001) and the suite asserts the operator reconciles the ksvc split —
  # pin to revision-1, a 75/25 canary, and the bare-rollback clear — with REAL
  # HTTP proving WHICH revision serves. Unlike cli-e2e the app image is a
  # real, servable, public digest-pinned image (ghcr.io/knative/helloworld-go,
  # multi-arch), so the ksvc genuinely becomes Ready with two revisions — no
  # SCALE_TEST_IMAGE repo variable required.
  #
  # INDEPENDENT job (own kind cluster) so a scale/cli flake never blocks it.
  # Deliberately NO continue-on-error: every assertion is state-based
  # (programmed traffic splits, CR fields, revision conditions), so a failure
  # here is signal, not noise.
  rollback-e2e:
    name: kn-next rollback pin/canary/clear against kind (e2e_rollback)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache-dependency-path: packages/kn-next-operator/go.sum

      # The suite shells out to the built CLI with plain `node` and builds it
      # via `pnpm --filter @knext/core build` — so the job needs Node + pnpm
      # (version pinned by `packageManager` in package.json) + workspace deps.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name kn-next-operator-test-e2e --wait 120s

      - name: Install cert-manager (operator webhook certs)
        run: |
          set -euo pipefail
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl wait --for=condition=Available --timeout=300s \
            -n cert-manager deployment/cert-manager deployment/cert-manager-webhook deployment/cert-manager-cainjector

      - name: Install Knative Serving + Kourier
        # Kourier is load-bearing here (not just doctor hygiene): the suite's
        # HTTP assertions route through the ksvc's cluster-local address, which
        # an ExternalName Service points at kourier-internal — no programmed
        # ingress, no routed requests, no rollback proof.
        run: |
          set -euo pipefail
          KNATIVE_VERSION="knative-v1.16.0"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-crds.yaml"
          kubectl apply -f "https://github.com/knative/serving/releases/download/${KNATIVE_VERSION}/serving-core.yaml"
          kubectl apply -f "https://github.com/knative/net-kourier/releases/download/${KNATIVE_VERSION}/kourier.yaml"
          kubectl patch configmap/config-network \
            --namespace knative-serving \
            --type merge \
            --patch '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
          kubectl wait --for=condition=Available --timeout=300s \
            -n knative-serving deployment/controller deployment/webhook deployment/autoscaler
          kubectl wait --for=condition=Available --timeout=300s \
            -n knative-serving deployment/net-kourier-controller

      - name: Run rollback e2e suite (pin / canary / clear)
        working-directory: packages/kn-next-operator
        env:
          KIND_CLUSTER: kn-next-operator-test-e2e
        run: make test-e2e-rollback

      - name: Tear down kind cluster
        if: always()
        run: kind delete cluster --name kn-next-operator-test-e2e || true
