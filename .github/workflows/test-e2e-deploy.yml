name: Compat suite (official Next.js deploy harness)

# ─────────────────────────────────────────────────────────────────────────────
# #89 / ADR-0007 A3-2 — the AUTHORITATIVE (slow) compatibility gate.
#
# This runs the OFFICIAL Next.js adapter compatibility harness: it checks out
# vercel/next.js at a PINNED ref, builds it, and runs `run-tests.js` in
# NEXT_TEST_MODE=deploy against knext's lifecycle scripts (scripts/e2e-*.sh) +
# the deploy manifest (test/deploy-tests-manifest.knext.json).
#
# HONESTY: this is an MVP SCAFFOLD. It runs a REAL but PARTIAL subset (modest
# shard count, Node runtime only to start). It does NOT yet pass the full suite,
# and its mere existence must NOT be read as "knext passes the official suite".
# The compat-matrix official-suite row stays ❌ until a green nightly (a separate
# graduation PR, ADR-0007 A3-3). The exclude-list (the manifest) is an honest
# ledger that grows from OBSERVED failures, never a pre-emptive fake green.
#
# Deliberately NOT in ci.yml: heavyweight (clones+builds Next.js + Playwright).
# Nightly + manual dispatch only — the fast per-PR gate is the compat-smoke job.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: 'vercel/next.js git ref to test against (pinned tag; do NOT use canary)'
        required: false
        default: 'v16.0.3'
  schedule:
    # 03:17 UTC nightly — off-peak; the run takes the better part of an hour.
    - cron: '17 3 * * *'

# Pin the Next.js ref so a failure is attributable to knext, not upstream churn.
# Aligns with the in-repo next@16.0.3 (CLAUDE.md / ADR-0007 version-skew caveat).
# NEXTJS_REF is the git TAG (kept for the source checkout that supplies the
# `test/` harness + `run-tests.js`); NEXT_NPM_VERSION is the published npm version
# (the tag minus the leading `v`) we `npm pack` the PREBUILT `next` from.
env:
  NEXTJS_REF: ${{ github.event.inputs.nextjsRef || 'v16.0.3' }}

jobs:
  build-next:
    name: Prepare prebuilt next + harness
    runs-on: ubuntu-latest
    # #147 step 1 (round 4 — the PREBUILT pivot). Rounds 1–3 tried to make this
    # job COMPILE next.js v16.0.3 from source within the runner window (timeout
    # 60→120→180, a build scoped to next + its workspace deps, a GHA-backed turbo
    # remote cache to incrementally persist a cancelled build). The source build
    # proved NON-CONVERGENT: even the scoped build exceeded the 180-min ceiling
    # across two cache-warming dispatches, so the 4 deploy-tests shards NEVER ran.
    #
    # PIVOT: stop building `next` from source. The PUBLISHED `next@16.0.3` npm
    # tarball IS the built `packages/next` at the same version — so testing the
    # knext adapter against it is functionally equivalent (arguably MORE correct
    # for an adapter compat test: it's the artifact real users install). The
    # reference deploy harness supports this FIRST-CLASS: when `NEXT_TEST_PKG_PATHS`
    # is set (a JSON [[name, tarballPath]] map), `test/lib/create-next-install.js`
    # SKIPS `linkPackages` (the source-pack step) and installs the provided
    # tarball into each fixture app. We still check out next.js at the pinned ref
    # for its `test/` harness + `run-tests.js`, and still `corepack pnpm install`
    # next.js's own deps so the harness runs — but `next` itself is the prebuilt
    # tarball, and `@next/swc` arrives prebuilt from that tarball's
    # optionalDependencies during the per-fixture install. No Rust, no source TS.
    #
    # DESIGN DEVIATION (for the architect, ADR-0007): the reference harness builds
    # `next` from the pinned SOURCE; we test against the PUBLISHED package of the
    # same version. Flagged in the PR for review.
    #
    # #147 — with the Playwright browser download skipped (the real 40-min hang),
    # this job is now pnpm RESOLUTION (~seconds) + an `npm pack` of the prebuilt
    # next (minutes). 60 min is ample headroom; the old 180-min ceiling existed
    # only to absorb the (now-removed) hanging chromium download.
    timeout-minutes: 60
    steps:
      - name: Checkout knext
        uses: actions/checkout@v4
        with:
          path: knext

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pin explicitly: knext is checked out under `path: knext`, so the action
        # cannot resolve a `packageManager` field at the workspace root and would
        # die with "No pnpm version is specified" — which skipped the deploy-tests
        # shards entirely. Keep in sync with `packageManager` in package.json.
        with:
          version: 10.4.1

      - name: Install knext deps
        working-directory: knext
        run: pnpm install --frozen-lockfile

      # Build the runtime + the adapter package so `npm pack @knext/core` ships a
      # working adapter for NEXT_ADAPTER_PATH.
      - name: Build @knext/lib + @knext/core
        working-directory: knext
        run: |
          pnpm --filter @knext/lib build
          pnpm --filter @knext/core build

      - name: Pack @knext/core adapter tarball
        working-directory: knext/packages/kn-next
        run: |
          npm pack
          ls -1 *.tgz

      # #147 (round 4) — derive the published npm VERSION from the git tag ref
      # (`v16.0.3` → `16.0.3`), then `npm pack` the PREBUILT `next` from the npm
      # registry. This tarball replaces the source build entirely. We stage it at
      # a STABLE path (next-prebuilt/next.tgz) under github.workspace so the
      # downloaded artifact resolves it identically in the shard jobs.
      - name: Acquire prebuilt next (npm pack)
        id: prebuilt
        run: |
          NEXT_NPM_VERSION="${NEXTJS_REF#v}"
          echo "Packing published next@${NEXT_NPM_VERSION}"
          mkdir -p "${GITHUB_WORKSPACE}/next-prebuilt"
          ( cd "${GITHUB_WORKSPACE}/next-prebuilt" \
            && TARBALL="$(npm pack "next@${NEXT_NPM_VERSION}" --silent | tail -n1)" \
            && mv "${TARBALL}" next.tgz )
          ls -la "${GITHUB_WORKSPACE}/next-prebuilt"
          echo "version=${NEXT_NPM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout vercel/next.js (pinned ref — supplies the test harness)
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: ${{ env.NEXTJS_REF }}
          path: next.js

      # IMPORTANT (the #137 follow-up): next.js v16.0.3 declares its OWN required
      # pnpm (`packageManager: pnpm@9.6.0`), which CLASHES with the knext pin
      # (10.4.1) set above via pnpm/action-setup. A single global pnpm cannot
      # satisfy both — running the next.js install under 10.4.1 fails the engine
      # check ("Unsupported engine ... wanted pnpm 9.6.0") and SKIPs every shard.
      # Fix: drive the next.js steps through corepack, which auto-selects pnpm
      # per-project from next.js's `packageManager` field. We call `corepack
      # pnpm` explicitly (not bare `pnpm`) so it resolves next.js's 9.6.0 rather
      # than the action-setup 10.4.1 shim on PATH. The knext build steps above
      # stay on 10.4.1; never hardcode 9.6.0 here — let corepack honor upstream.
      - name: Enable corepack (next.js per-project package manager)
        working-directory: next.js
        run: corepack enable

      # #147 (the cold-install decider) — resolve next.js's pnpm content-addressable
      # store dir so actions/cache can target it. #157 removed this along with the
      # (correctly-removed) source build; re-add it so the heavyweight install can
      # be cached. We must resolve via corepack so it honors next.js's pinned pnpm.
      - name: Resolve next.js pnpm store path
        id: pnpm-store
        working-directory: next.js
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      # Cache the pnpm content-addressable store keyed on NEXTJS_REF + the next.js
      # lockfile, so a REPEAT run skips re-downloading every dependency. NEXTJS_REF
      # is in the key so a ref bump invalidates it (the v16.0.3 store is not valid
      # for a different ref); the lockfile hash invalidates it on a dep change.
      # This is the pnpm STORE only — the turbo BUILD cache stays gone (no source
      # build to persist).
      - name: Cache next.js pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: nextjs-pnpm-store-${{ env.NEXTJS_REF }}-${{ hashFiles('next.js/pnpm-lock.yaml') }}
          restore-keys: |
            nextjs-pnpm-store-${{ env.NEXTJS_REF }}-

      # Install next.js's OWN deps so `run-tests.js` + the source `test/` harness
      # run. We do NOT build `next` here — the prebuilt tarball IS `next`, and the
      # prebuilt `@next/swc` native binary arrives from that tarball's
      # optionalDependencies during each fixture app's install (the harness handles
      # it).
      #
      # SLIM the cold install (#147): the deploy harness only imports ROOT
      # devDependencies — run-tests.js (@actions/core, @vercel/kv, async-sema,
      # glob, yargs), create-next-install (execa, fs-extra), and the test/lib
      # helpers (cheerio, express, get-port, strip-ansi, playwright). It needs
      # NONE of the monorepo's workspace packages (packages/*, apps/*, bench/*,
      # turbopack/*) installed at THIS stage: create-next-install builds each
      # fixture's temp app separately and (in prebuilt mode, via NEXT_TEST_PKG_PATHS)
      # installs `next` from the tarball, skipping its source-pack `linkPackages`.
      # So `--filter "{.}"` (the root project, no dependents) collapses the dep
      # graph to just the root devDeps; --frozen-lockfile avoids a full cold
      # re-resolve and --prefer-offline reuses the restored store. A cold,
      # uncached, FULL-monorepo install of next.js exceeded the 180-min ceiling
      # (#157 regression); this filtered+cached install converges in minutes.
      #
      # NEXT_SKIP_NATIVE_POSTINSTALL=1: next.js's root postinstall
      # (scripts/install-native.mjs) otherwise runs a `pnpm add next@<ver>` to
      # fetch all 8 @next/swc platform binaries — pure waste in prebuilt mode,
      # where @next/swc arrives from the tarball during each fixture install.
      #
      # #147 (THE root cause — definitive, run 28310661064 install-step log):
      # `corepack pnpm install` RESOLVES all 3345 packages in ~3 SECONDS
      # ("resolved 3345, reused 3337, downloaded 0, added 0, done"). The pnpm
      # install is NOT the bottleneck. Each retry attempt then HUNG for 40 minutes
      # in the `playwright-chromium` package's POSTINSTALL — downloading the
      # Chromium browser binary from Playwright's CDN — which timed out (the same
      # network throttling failing Docker Hub pulls all session), got killed by
      # the per-attempt timeout, and failed all 4 attempts (`playwright-chromium
      # install: Failed` / `ELIFECYCLE`). Every prior "infra-bound / 180-min"
      # conclusion was actually THIS browser download hanging.
      #
      # FIX: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 makes the playwright-chromium
      # postinstall SKIP the browser fetch, so this install finishes in seconds
      # (resolution only). The browser binary is only needed when a test actually
      # drives `next-webdriver`; chromium is therefore installed in the SHARD job
      # (cached + retry/timeout-wrapped), NOT in this blocking Prepare install.
      # PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS=1 avoids a host-requirements
      # probe that can also stall in this CI env.
      #
      # The retry loop + pnpm network hardening below STAY as harmless
      # defense-in-depth (a stuck registry request still fails-fast-and-retries),
      # but they are no longer the critical path now the browser download is gone.
      - name: Setup Next.js test-harness deps (skip Playwright browser download)
        working-directory: next.js
        env:
          NEXT_SKIP_NATIVE_POSTINSTALL: '1'
          # THE fix: skip the playwright-chromium postinstall browser download —
          # that CDN fetch (not pnpm resolution) is what hung the whole job.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: '1'
          # Network hardening for the flaky CI registry/network. pnpm honors these
          # NPM_CONFIG_* env vars; they apply to the next.js install below.
          NPM_CONFIG_FETCH_RETRIES: '5'
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'
          NPM_CONFIG_FETCH_TIMEOUT: '600000'
          # Lower the parallel-request fan-out (pnpm default 16) so we don't
          # overwhelm the flaky network and trigger more stuck sockets.
          NPM_CONFIG_NETWORK_CONCURRENCY: '8'
        run: |
          # Retry loop with a per-attempt timeout. Defense-in-depth only now that
          # the browser download is skipped — resolution alone finishes in seconds,
          # but the pnpm store + restored cache persist between attempts so a stuck
          # registry request still resumes rather than hanging the job.
          attempts=4
          installed=0
          for i in $(seq 1 "$attempts"); do
            echo "::group::pnpm install attempt $i/$attempts (per-attempt timeout 40m)"
            if timeout 40m corepack pnpm install --frozen-lockfile --prefer-offline --filter "{.}"; then
              echo "pnpm install succeeded on attempt $i"
              installed=1
              echo "::endgroup::"
              break
            fi
            echo "pnpm install attempt $i failed or timed out; the store keeps the bytes it fetched so the next attempt resumes"
            echo "::endgroup::"
            sleep 15
          done
          if [ "$installed" -ne 1 ]; then
            echo "pnpm install did not complete within $attempts attempts" >&2
            exit 1
          fi

      # Hand off the prepared knext + next.js SOURCE trees + the prebuilt next
      # tarball to the shard jobs.
      #
      # #147 (run 28314500989 — the Upload-workspace OOM): once #160 made the
      # Prepare install finish in 26s, the NEXT blocker was this upload OOMing with
      # `FATAL ERROR: ... JavaScript heap out of memory`. Cause: the next.js tree
      # carries its full node_modules (3345 packages, hundreds of thousands of
      # files); actions/upload-artifact globs + hashes EVERY file and exhausts the
      # heap. FIX (Option A — don't ship node_modules): EXCLUDE `**/node_modules`
      # so the artifact is SOURCE-ONLY (the source trees + next-prebuilt/next.tgz +
      # the @knext/core adapter .tgz). Each deploy-tests shard then restores the
      # SAME pnpm-store actions/cache the steps above warmed and RE-RUNS the same
      # slim, offline, cache-hit install in next.js (seconds) to rebuild
      # node_modules locally — see the shard's "Re-install next.js harness deps".
      #
      # NODE_OPTIONS belt-and-suspenders: even source-only, the upload still hashes
      # a large tree; raise the old-space size so a borderline case can't OOM.
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        with:
          name: compat-workspace
          path: |
            knext
            next.js
            next-prebuilt
            !**/node_modules
          retention-days: 1
          include-hidden-files: true

  deploy-tests:
    name: Deploy tests (shard ${{ matrix.shard }})
    needs: build-next
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # MVP: a MODEST 4-way shard (the reference uses 16). Bump deliberately as
        # the suite stabilizes; 4 keeps the nightly cost honest for the scaffold.
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: compat-workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Same pin as build-next: the workspace is the downloaded artifact, with
        # no resolvable `packageManager` at its root. Keep in sync with package.json.
        with:
          version: 10.4.1

      # The shard drives next.js's per-project pnpm (9.6.0) via `corepack pnpm`
      # for the playwright-version resolve + the chromium install. build-next
      # `corepack enable`s before its corepack calls; the shard must too, or those
      # `corepack pnpm` invocations run against a non-enabled corepack shim.
      - name: Enable corepack (next.js per-project package manager)
        working-directory: next.js
        run: corepack enable

      # #147 (the Upload-workspace OOM fix, Option A) — the compat-workspace
      # artifact ships SOURCE ONLY (no node_modules; shipping it OOM'd the upload,
      # run 28314500989). So the shard rebuilds next.js's node_modules locally.
      # First restore the SAME pnpm-store actions/cache the Prepare job warmed —
      # IDENTICAL key (NEXTJS_REF + next.js/pnpm-lock.yaml hash) — so the re-install
      # below is an OFFLINE cache HIT (seconds), not a cold download.
      - name: Resolve next.js pnpm store path
        id: pnpm-store
        working-directory: next.js
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore next.js pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: nextjs-pnpm-store-${{ env.NEXTJS_REF }}-${{ hashFiles('next.js/pnpm-lock.yaml') }}
          restore-keys: |
            nextjs-pnpm-store-${{ env.NEXTJS_REF }}-

      # Re-run the SAME slim, frozen, offline install the Prepare job ran to
      # rebuild next.js/node_modules (excluded from the artifact). With the store
      # cache restored this is a cache hit → seconds. PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
      # is kept so this re-install does NOT re-trigger the #160 chromium-download
      # hang — chromium is installed by the dedicated cached/non-fatal step below.
      - name: Re-install next.js harness deps (offline cache hit; node_modules rebuilt)
        working-directory: next.js
        env:
          NEXT_SKIP_NATIVE_POSTINSTALL: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: '1'
          NPM_CONFIG_FETCH_RETRIES: '5'
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'
          NPM_CONFIG_FETCH_TIMEOUT: '600000'
          NPM_CONFIG_NETWORK_CONCURRENCY: '8'
        run: |
          attempts=4
          installed=0
          for i in $(seq 1 "$attempts"); do
            echo "::group::pnpm install attempt $i/$attempts (per-attempt timeout 40m)"
            if timeout 40m corepack pnpm install --frozen-lockfile --prefer-offline --filter "{.}"; then
              echo "pnpm install succeeded on attempt $i"
              installed=1
              echo "::endgroup::"
              break
            fi
            echo "pnpm install attempt $i failed or timed out; the restored store keeps the bytes it fetched so the next attempt resumes"
            echo "::endgroup::"
            sleep 15
          done
          if [ "$installed" -ne 1 ]; then
            echo "pnpm install did not complete within $attempts attempts" >&2
            exit 1
          fi

      # #147 — chromium lives HERE, not in the blocking Prepare install. The
      # Prepare install set PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 (the browser download
      # was the 40-min hang). The deploy-eligible e2e tests that drive a browser via
      # `next-webdriver` need chromium, so install it in the shard that uses it —
      # cached (so the CDN download is not repeated every run) and retry/timeout
      # wrapped (so a stuck download is bounded + retried, never an open-ended hang).
      # The cache key is the playwright version resolved from next.js's lockfile.
      - name: Resolve Playwright version (for the chromium cache key)
        id: pw
        working-directory: next.js
        run: |
          VERSION="$(corepack pnpm ls playwright-chromium --depth -1 --parseable 2>/dev/null | sed -n 's/.*playwright-chromium@//p' | head -n1)"
          if [ -z "$VERSION" ]; then
            VERSION="$(corepack pnpm why playwright-chromium 2>/dev/null | sed -n 's/.*playwright-chromium \([0-9][^ ]*\).*/\1/p' | head -n1)"
          fi
          echo "version=${VERSION:-unknown}" >> "$GITHUB_OUTPUT"
          echo "Resolved playwright-chromium version: ${VERSION:-unknown}"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.pw.outputs.version }}
          # If the version resolve misses (falls back to `...-unknown`), a prefix
          # restore-key still recovers a previously-cached chromium instead of
          # pinning a stale `unknown` entry — and never invalidates the keyed hit.
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright chromium (retry + per-attempt timeout, NON-FATAL)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: next.js
        env:
          # If the CDN throttles like the rest of this CI env, fail-fast-and-retry
          # rather than hang: bound each attempt and retry a handful of times.
          PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS: '1'
        run: |
          attempts=4
          installed=0
          for i in $(seq 1 "$attempts"); do
            echo "::group::playwright install chromium attempt $i/$attempts (per-attempt timeout 10m)"
            if timeout 10m corepack pnpm playwright install chromium --with-deps; then
              echo "playwright install succeeded on attempt $i"
              installed=1
              echo "::endgroup::"
              break
            fi
            echo "playwright install attempt $i failed or timed out; retrying"
            echo "::endgroup::"
            sleep 15
          done
          # NON-FATAL by design (#147 step 1). This step hits the SAME throttled
          # Playwright CDN this PR diagnoses, so all attempts can legitimately fail.
          # A hard non-zero exit here would ABORT the shard — skipping the ~678/743
          # tests that do NOT need a browser. The milestone is "the shards EXECUTE",
          # so we WARN + CONTINUE and let the shard proceed to run-tests.js; only
          # the ~65 browser-driving tests then fail (genuinely absent chromium). This
          # mirrors the `|| true` resilience of the test-run step below.
          if [ "$installed" -ne 1 ]; then
            echo "::warning::chromium unavailable after $attempts attempts; browser-driving e2e will fail but the rest of the shard will still run"
          fi

      - name: Make lifecycle scripts executable
        working-directory: knext
        run: chmod +x scripts/e2e-deploy.sh scripts/e2e-logs.sh scripts/e2e-cleanup.sh

      # #147 / A3-3 — THE reason 0 tests ran was TWO-fold; this step fixes the
      # second half. (1) The knext manifest used to `version: 1`, which made
      # next.js's test/get-test-filter.js THROW `Unknown manifest version: 1` at
      # run-tests.js module load — fixed by switching the manifest to v2. (2) Even
      # with the manifest selecting tests, jest could not LOAD a single deploy
      # test module: every test/e2e/**/*.test.ts imports `e2e-utils` /
      # `next-test-utils`, which `import` from `next/dist/trace`, `next/constants`,
      # and `next/dist/server/next` at MODULE SCOPE — and jest.config.js itself
      # does `require('next/jest')`. All resolve to the WORKSPACE `packages/next`,
      # whose `dist/` is ABSENT in the prebuilt model (we never build next from
      # source — hence the `packages/next/dist/bin/next ENOENT` warnings).
      #
      # FIX (honest + cheap, no source build): the PUBLISHED next@<ref> tarball we
      # already `npm pack`ed (next-prebuilt/next.tgz) IS the built `packages/next`
      # at the same version — it contains dist/, jest.js, constants.js, etc. Unpack
      # its `package/` payload INTO next.js/packages/next/ so those module-scope
      # imports resolve from the prebuilt artifact. This is the SAME artifact the
      # per-fixture install (NEXT_TEST_PKG_PATHS) uses, so the harness code under
      # test and the fixture runtime stay version-consistent. Still NO Rust, no
      # source TS build. (ADR-0007 A3-3 constraint: deploy test FILES require a
      # built workspace `next` to LOAD; the prebuilt tarball satisfies that.)
      - name: Hydrate workspace next/dist from the prebuilt tarball (so jest can load tests)
        working-directory: next.js
        run: |
          set -euo pipefail
          PKG_DIR="packages/next"
          if [ ! -d "$PKG_DIR" ]; then
            echo "::error::expected next.js source dir $PKG_DIR (the checked-out packages/next)" >&2
            exit 1
          fi
          # Unpack the prebuilt tarball (npm tarballs root everything under package/).
          tar xzf "${GITHUB_WORKSPACE}/next-prebuilt/next.tgz" -C "${RUNNER_TEMP}"
          SRC="${RUNNER_TEMP}/package"
          # Overlay the BUILT artifacts the harness imports at module scope. We copy
          # dist/ plus the root JS entrypoints (jest.js, constants.js, etc.) WITHOUT
          # clobbering the checked-out source package.json (its name/version already
          # match the prebuilt tarball: next@${NEXTJS_REF#v}).
          cp -R "${SRC}/dist" "${PKG_DIR}/dist"
          for f in "${SRC}"/*.js; do
            [ -e "$f" ] || continue
            cp "$f" "${PKG_DIR}/$(basename "$f")"
          done
          # Sanity: the four module-scope imports the harness needs must now resolve.
          node -e '
            const path = require("path");
            const base = path.resolve("packages/next");
            for (const m of ["jest.js", "constants.js", "dist/trace/index.js", "dist/server/next.js"]) {
              require("fs").accessSync(path.join(base, m));
            }
            console.log("prebuilt next/dist hydrated: harness imports resolve");
          '

      # #147 / A3-3 — hydrate the @next/* HARNESS LOAD CLOSURE. Run 28316667494:
      # with the v2 manifest + the next/dist hydrate above (#162), the harness
      # SELECTED real deploy test files — but every selected test then crashed at
      # MODULE LOAD with:
      #   Cannot find module '.../packages/next/node_modules/@next/env/dist/index.js'.
      #   Please verify that the package.json has a valid "main" entry
      # → summary stayed {passed:0,failed:0,excluded:N}: real selection, but a
      # load-crash is neither a pass nor a fail, so jest tallied nothing.
      #
      # ROOT CAUSE: the next/dist hydrate above was NOT the full closure. The
      # harness imports `next/dist/trace` + `next/dist/server/next` at MODULE SCOPE
      # (test/lib/e2e-utils, next-test-utils) and jest.config.js requires
      # `next/jest` (→ next/dist/build/jest/jest); all of those transitively
      # `require('@next/env')` at module scope. `@next/env` is a SEPARATE workspace
      # package — source dir `packages/next-env`, published to npm as
      # `@next/env@<ref>` — whose `dist/` is ALSO unbuilt in the prebuilt model, so
      # the workspace symlink `packages/next/node_modules/@next/env` points at a
      # dist-less dir (hence the missing `dist/index.js` / invalid "main").
      #
      # FIX (honest + cheap, mirrors the next/dist hydrate, NO source/Rust build):
      # `npm pack` each needed `@next/*` package at the SAME version as next
      # (`${NEXTJS_REF#v}`, the same derivation build-next uses for `npm pack
      # next@`), unpack it, and copy its built `dist/` into the matching workspace
      # source dir so the symlink target resolves. Kept as a LIST (a bash loop) so
      # the next missing `@next/*` package — if CI surfaces one — is ONE entry.
      #
      # The closure verified against vercel/next.js@v16.0.3 + the published tarballs
      # is exactly `@next/env`: it is the ONLY non-swc `@next/*` the prebuilt
      # `next/dist` `require`s at module scope. The other runtime `@next/*` (font,
      # polyfill-module, polyfill-nomodule, react-refresh-utils) are build-time
      # ASSET paths, never module-scope-required on the harness load path, and
      # `@next/telemetry` is only a JSDoc @type annotation. If a later run surfaces
      # another, add `name:source-dir` to the list below.
      - name: Hydrate @next/* harness load closure from published tarballs (so test modules load)
        working-directory: next.js
        run: |
          set -euo pipefail
          NEXT_NPM_VERSION="${NEXTJS_REF#v}"
          # "<npm package name>:<workspace source dir>" — the source dir is where the
          # workspace symlink target lives (e.g. @next/env's source is packages/next-env).
          # Add one line here to extend the closure; stay build-free (published dist only).
          PKGS=(
            "@next/env:packages/next-env"
          )
          for entry in "${PKGS[@]}"; do
            pkg="${entry%%:*}"
            src_dir="${entry##*:}"
            if [ ! -d "$src_dir" ]; then
              echo "::error::expected next.js source dir $src_dir for $pkg" >&2
              exit 1
            fi
            echo "::group::hydrate ${pkg}@${NEXT_NPM_VERSION} -> ${src_dir}/dist"
            work="$(mktemp -d)"
            ( cd "$work" && npm pack "${pkg}@${NEXT_NPM_VERSION}" --silent >/dev/null )
            tar xzf "$work"/*.tgz -C "$work"
            if [ ! -d "$work/package/dist" ]; then
              echo "::error::published ${pkg}@${NEXT_NPM_VERSION} has no dist/ to hydrate" >&2
              exit 1
            fi
            rm -rf "${src_dir}/dist"
            cp -R "$work/package/dist" "${src_dir}/dist"
            echo "::endgroup::"
          done
          # Sanity: @next/env must now resolve from the workspace next package, i.e.
          # the exact module the load-crash reported missing.
          node -e '
            const path = require("path");
            const dist = path.resolve("packages/next-env/dist/index.js");
            require("fs").accessSync(dist);
            console.log("@next/* load closure hydrated:", dist);
          '

      # #147 / A3-3 — hydrate the prebuilt @next/swc NATIVE binary. Run 28317087611:
      # with the @next/* load closure hydrated (#163), the harness SELECTED + LOADED
      # real deploy test files — but every selected test then crashed at SETUP with:
      #   ⨯ Failed to load SWC binary for linux/x64
      #     ... Error: Failed to get registry from "pnpm".
      #     [cause]: Command failed: pnpm config get registry
      #       ERROR Failed to switch pnpm to v9.6.0. ... pnpm CLI is missing ...
      # → run-tests.js aborted the shard on the first test (`exiting with code 1`),
      #   so only ONE test ran per shard and all reported `failed with code: 1`.
      #
      # ROOT CAUSE (this is diagnosis (ii): a HARNESS-ENV failure, NOT a missing
      # module and NOT a genuine adapter test failure): the workspace `packages/next`
      # build needs `@next/swc` (the native Rust binary). In the prebuilt model we
      # set NEXT_SKIP_NATIVE_POSTINSTALL=1, so NO `@next/swc-<platform>` is installed
      # in next.js/node_modules. next then tries its WASM fallback, which calls
      # `getRegistry()` → `pnpm config get registry`; that spawn dies because next.js
      # pins pnpm@9.6.0 via corepack and the 9.6.0 binary is absent in the jest child
      # env. So SWC never loads → `next build` fails → the test errors before any
      # assertion runs.
      #
      # FIX (honest + cheap, mirrors the @next/env + next/dist hydrates, NO Rust/
      # source build): `npm pack` the PUBLISHED `@next/swc-<platformArchABI>` at the
      # SAME version as next, unpack its `next-swc.<triple>.node` into a stable dir,
      # and point next at it via NEXT_TEST_NATIVE_DIR (the harness's first-class
      # "use a local built @next/swc" hook — packages/next/src/build/swc/index.ts).
      # That env is inherited by both the workspace-next build AND the fixture
      # `next build` the deploy script runs, so neither hits the WASM/registry path.
      # Kept as a one-line-extensible LIST so adding the musl triple (or another
      # platform) is a single entry — same pattern as the @next/* closure above.
      - name: Hydrate prebuilt @next/swc native binary (so next build skips the WASM/registry path)
        id: swc
        working-directory: next.js
        run: |
          set -euo pipefail
          NEXT_NPM_VERSION="${NEXTJS_REF#v}"
          NATIVE_DIR="${GITHUB_WORKSPACE}/next-swc-native"
          mkdir -p "${NATIVE_DIR}"
          # "<npm package name>:<platformArchABI>" — ubuntu-latest runners are
          # linux-x64 glibc, so linux-x64-gnu is the one next actually loads; the
          # musl entry is harmless belt-and-suspenders. Add a line to extend.
          TRIPLES=(
            "@next/swc-linux-x64-gnu:linux-x64-gnu"
          )
          for entry in "${TRIPLES[@]}"; do
            pkg="${entry%%:*}"
            triple="${entry##*:}"
            echo "::group::hydrate ${pkg}@${NEXT_NPM_VERSION} -> ${NATIVE_DIR}/next-swc.${triple}.node"
            work="$(mktemp -d)"
            ( cd "$work" && npm pack "${pkg}@${NEXT_NPM_VERSION}" --silent >/dev/null )
            tar xzf "$work"/*.tgz -C "$work"
            NODE_FILE="$work/package/next-swc.${triple}.node"
            if [ ! -f "${NODE_FILE}" ]; then
              echo "::error::published ${pkg}@${NEXT_NPM_VERSION} has no next-swc.${triple}.node" >&2
              exit 1
            fi
            cp "${NODE_FILE}" "${NATIVE_DIR}/next-swc.${triple}.node"
            echo "::endgroup::"
          done
          echo "dir=${NATIVE_DIR}" >> "$GITHUB_OUTPUT"
          # Sanity: the native binary the loader requires must now exist + be loadable.
          node -e '
            const path = require("path");
            const f = path.join(process.env.NATIVE_DIR, "next-swc.linux-x64-gnu.node");
            require("fs").accessSync(f);
            console.log("@next/swc native hydrated:", f);
          '
        env:
          NATIVE_DIR: ${{ github.workspace }}/next-swc-native

      # #147 / A3-3 — DO NOT override next.js's jest.config.js.
      #
      # Run 28318485456 DISPROVED the prior theory. The previous step overwrote
      # `next.js/jest.config.js` to move `rootDir` from `test` to the repo root, on
      # the theory that the harness's repo-root-relative positional
      # (`test/e2e/<…>/index.test.ts`) only matched at rootDir=repo-root. That
      # override SHIPPED and STILL produced `No tests found … Pattern: … - 0 matches`
      # on every shard — so rootDir was never the variable.
      #
      # GROUND TRUTH (vercel/next.js @ v16.0.3, verified against the real source +
      # a faithful jest@29.7.0 reproduction):
      #   • run-tests.js:301-304 globs the test list with `cwd: __dirname` (the next.js
      #     REPO ROOT), so each `test.file` is the repo-root-relative `test/e2e/<…>`.
      #   • run-tests.js:520 passes `test.file` as a jest POSITIONAL; :600 spawns jest
      #     with NO `cwd` (so cwd = next.js/) and NO `--config` (so jest auto-discovers
      #     next.js/jest.config.js).
      #   • next.js's UPSTREAM jest.config.js uses `rootDir: 'test'`. jest@29.7.0
      #     (next.js's pinned jest, pnpm-lock.yaml) matches the positional as a
      #     case-insensitive RegExp against the ABSOLUTE test path
      #     (jest SearchSource.js + jest-util/testPathPatternToRegExp). A faithful
      #     local repro (real next/jest, the real 404-page-router fixture, the full
      #     packages/next/src haste collisions, CI=1) shows the UPSTREAM config FINDS
      #     and runs `test/e2e/404-page-router/index.test.ts` — `--listTests` lists it.
      #     The override (rootDir='.') ALSO matches locally; neither is the lever.
      #
      # So the override is UNNECESSARY *and* unproven — next.js itself runs exactly
      # these deploy tests with the upstream `rootDir: 'test'` config (the
      # `test-deploy-*` package scripts). We therefore STOP overwriting it and let the
      # upstream config stand. We keep only a fast sanity check that the harness paths
      # the deploy tests import are present (a missing checkout is the one remaining
      # explanation a green run would rule in/out), and a guard that flags it loudly if
      # upstream ever moves rootDir — without silently rewriting upstream's file.
      - name: Verify next.js jest harness is intact (do NOT override the upstream config)
        working-directory: next.js
        run: |
          set -euo pipefail
          # The deploy tests + their module-scope imports live here; if the checkout
          # didn't materialize them, jest legitimately finds nothing (and that is a
          # checkout bug, not a jest-config bug).
          test -f jest.config.js
          test -f test/jest-setup-after-env.ts
          test -d test/lib
          test -d test/e2e
          test -f test/e2e/404-page-router/index.test.ts
          # Surface (don't mask) an upstream rootDir change: the harness contract above
          # is reasoned against `rootDir: 'test'`. We do not act on it — purely a signal.
          if ! grep -qE "rootDir:\s*'test'" jest.config.js; then
            echo "::warning::next.js jest.config.js no longer roots at 'test'; re-verify the run-tests.js positional-path contract"
          fi
          node -e "require('./jest.config.js'); console.log('upstream next.js jest.config.js loads OK (rootDir untouched)')"

      # === A3-3 TEMPORARY DEBUG (throwaway branch agent/compat-a33-jest-debug) ===
      # Diagnostic only: capture jest's GROUND-TRUTH file-crawl / candidate set in CI,
      # to explain why jest reports "Pattern: test/e2e/404-page-router/index.test.ts -
      # 0 matches" in CI while a faithful local repro with the SAME config finds it.
      # `|| true` everywhere so this never fails the job. Grep the log for the
      # `A33DBG_*` markers below. REMOVE before merge (this is a debug-only branch).
      - name: A3-3 jest resolution debug (TEMPORARY)
        working-directory: next.js
        run: |
          set +e
          echo "===== A33DBG_BEGIN ====="

          echo "===== A33DBG_1_CHECKOUT ====="
          echo "A33DBG_PWD=$(pwd)"
          echo "A33DBG_HEAD=$(git rev-parse HEAD 2>&1)"
          echo "A33DBG_SPARSE=$(git -C . sparse-checkout list 2>/dev/null || echo 'no sparse-checkout')"

          echo "===== A33DBG_2_LS ====="
          ls -la test/e2e/404-page-router/ 2>&1
          if test -f test/e2e/404-page-router/index.test.ts; then echo "A33DBG_FILE=FILE_PRESENT"; else echo "A33DBG_FILE=FILE_ABSENT"; fi

          echo "===== A33DBG_3_GITTRACKED ====="
          A33_TRACKED=$(git ls-files test/e2e/404-page-router/index.test.ts 2>&1)
          echo "A33DBG_GITLSFILES=[${A33_TRACKED}]"
          if [ -z "${A33_TRACKED}" ]; then echo "A33DBG_TRACKED=UNTRACKED_LIKELY_BUG"; else echo "A33DBG_TRACKED=TRACKED"; fi

          # NOTE: run 28319496020 showed unbounded `jest --showConfig`/`--listTests`
          # HANG in this CI env (printed A33DBG_4 then nothing, job ran to the 60min
          # timeout). EVERY jest call below is now wrapped in `timeout 90` so a hang is
          # bounded + visible (A33DBG_*_TIMEOUT=<exit>; timeout exits 124).
          echo "===== A33DBG_4_CONFIGINPUT ====="
          echo "A33DBG_JESTCONFIG_HEAD:"
          head -40 jest.config.js 2>&1
          echo "A33DBG_HAS_NEXT_CONFIG=$(ls next.config.* 2>/dev/null || echo none)"

          echo "===== A33DBG_4b_SHOWCONFIG ====="
          timeout 90 node_modules/.bin/jest --showConfig 2>&1 | head -150 || echo "A33DBG_SHOWCONFIG_TIMEOUT_OR_ERR=$?"

          echo "===== A33DBG_5_LISTTESTS ====="
          A33_LIST=$(timeout 90 node_modules/.bin/jest --listTests 2>&1); A33_LIST_RC=$?
          if [ $A33_LIST_RC -ne 0 ]; then echo "A33DBG_LISTTESTS_TIMEOUT_OR_ERR=$A33_LIST_RC"; fi
          echo "A33DBG_LISTTESTS_COUNT=$(echo "$A33_LIST" | grep -c '\.test\.')"
          echo "$A33_LIST" | grep '404-page-router' || echo "A33DBG_LISTTESTS_404=404-page-router NOT in listTests candidate set"

          echo "===== A33DBG_6_LISTTESTS_POSITIONAL ====="
          timeout 90 node_modules/.bin/jest --ci --listTests 'test/e2e/404-page-router/index.test.ts' 2>&1 | head -20 || echo "A33DBG_POSITIONAL_TIMEOUT=$?"

          echo "===== A33DBG_6b_LISTTESTS_ABS ====="
          timeout 90 node_modules/.bin/jest --ci --listTests "$(pwd)/test/e2e/404-page-router/index.test.ts" 2>&1 | head -20 || echo "A33DBG_ABS_TIMEOUT=$?"

          echo "===== A33DBG_6c_MINCONFIG ====="
          # Isolate next/jest (next.js's own jest.config via next/jest -> async
          # createJestConfig, which may hang loading next.config) from plain jest
          # resolution. If THIS resolves the test fast, the upstream config is the cause.
          cat > /tmp/min.jest.config.js <<'MINEOF'
          module.exports = { rootDir: process.cwd(), roots: ['<rootDir>/test'], testMatch: ['**/*.test.{js,ts,tsx}'], testEnvironment: 'node' };
          MINEOF
          timeout 90 node_modules/.bin/jest --config /tmp/min.jest.config.js --listTests 'test/e2e/404-page-router/index.test.ts' 2>&1 | head -20 || echo "A33DBG_MINCONFIG_TIMEOUT=$?"

          echo "===== A33DBG_8_RUNBYPATH ====="
          # Run 28321154732: even the MINIMAL config matches 1706 testMatch candidates
          # but the positional 'test/...index.test.ts' filters to 0 — the textbook
          # symptom of jest treating the arg as a testPathPattern REGEX that matches 0
          # of the candidate set, rather than a literal file path. `--runTestsByPath`
          # treats args as literal file paths. Probe: does it make the test FOUND?
          echo "A33DBG_8a_RUNBYPATH_MIN:"
          timeout 90 node_modules/.bin/jest --config /tmp/min.jest.config.js --runTestsByPath --listTests 'test/e2e/404-page-router/index.test.ts' 2>&1 | head -20 || echo "A33DBG_RUNBYPATH_MIN_RC=$?"
          echo "A33DBG_8a_RUNBYPATH_AUTO:"
          timeout 90 node_modules/.bin/jest --runTestsByPath --listTests 'test/e2e/404-page-router/index.test.ts' 2>&1 | head -20 || echo "A33DBG_RUNBYPATH_AUTO_RC=$?"
          # Control: is 404-page-router even AMONG the unfiltered candidate set?
          # >0 => candidate exists, pattern-matching is the bug (--runTestsByPath is the fix).
          # 0  => file isn't a candidate at all => deeper haste-crawl issue.
          echo "A33DBG_8b_INLIST="
          timeout 90 node_modules/.bin/jest --config /tmp/min.jest.config.js --listTests 2>&1 | grep -c '404-page-router' || echo "A33DBG_INLIST_RC=$?"
          echo "A33DBG_8_DONE"

          echo "===== A33DBG_7_VERSIONS ====="
          echo "A33DBG_JEST_VERSION=$(node -e "console.log(require('jest/package.json').version)" 2>&1)"
          echo "A33DBG_HASTEMAP_VERSION=$(node -e "console.log(require('jest-haste-map/package.json').version)" 2>&1)"
          echo "A33DBG_WATCHMAN=$(which watchman || echo no-watchman)"

          echo "===== A33DBG_END ====="
          true
        continue-on-error: true

      # === A3-3 SMOKE (throwaway branch agent/compat-a33-jest-debug) ===
      # Control experiment: can jest run ANY test in this CI tree, or is "No tests
      # found" specific to the deploy test files? Plant a trivial dependency-free test
      # (no next/e2e-utils imports) and run it 4 ways. If it prints "1 passed", jest
      # discovery+run WORKS and the deploy-harness setup is the culprit; if even this
      # prints "No tests found", jest discovery is fundamentally broken in this
      # prebuilt-overlay CI env. Grep the log for A33SMOKE_* markers. Remove before merge.
      - name: A3-3 jest smoke test (TEMPORARY)
        working-directory: next.js
        run: |
          set +e
          echo "===== A33SMOKE_BEGIN ====="

          # 1. Plant a trivial, dependency-free test we fully control.
          mkdir -p test/e2e/knext-smoke
          cat > test/e2e/knext-smoke/knext-smoke.test.ts <<'SMOKE'
          it('knext smoke: jest can run a test in this tree', () => { expect(1).toBe(1) })
          SMOKE
          echo "A33SMOKE_PLANTED"
          ls -la test/e2e/knext-smoke/ 2>&1

          # 2a. Auto config, pattern form (positional as testPathPattern regex).
          echo "===== A33SMOKE_A ====="
          timeout 90 node_modules/.bin/jest --ci --runInBand --forceExit test/e2e/knext-smoke/knext-smoke.test.ts 2>&1 | tail -15 || echo "A33SMOKE_A_RC=$?"

          # 2b. Auto config, --runTestsByPath (positional as literal file path).
          echo "===== A33SMOKE_B ====="
          timeout 90 node_modules/.bin/jest --ci --runInBand --forceExit --runTestsByPath test/e2e/knext-smoke/knext-smoke.test.ts 2>&1 | tail -15 || echo "A33SMOKE_B_RC=$?"

          # 2c. Auto config, --runTestsByPath with ABSOLUTE path.
          echo "===== A33SMOKE_C ====="
          timeout 90 node_modules/.bin/jest --ci --runInBand --forceExit --runTestsByPath "$(pwd)/test/e2e/knext-smoke/knext-smoke.test.ts" 2>&1 | tail -15 || echo "A33SMOKE_C_RC=$?"

          # 2d. Minimal plain config (rootDir=cwd, roots=smoke dir, node env), --runTestsByPath.
          echo "===== A33SMOKE_D ====="
          cat > /tmp/min.jest.config.js <<'MINEOF'
          module.exports = { rootDir: process.cwd(), roots: ['<rootDir>/test/e2e/knext-smoke'], testMatch: ['**/*.test.{js,ts,tsx}'], testEnvironment: 'node' };
          MINEOF
          timeout 90 node_modules/.bin/jest --config /tmp/min.jest.config.js --runInBand --forceExit --runTestsByPath test/e2e/knext-smoke/knext-smoke.test.ts 2>&1 | tail -15 || echo "A33SMOKE_D_RC=$?"

          echo "A33SMOKE_SUMMARY_DONE"
          echo "===== A33SMOKE_END ====="
          true
        continue-on-error: true

      - name: Run official deploy tests (knext adapter)
        working-directory: next.js
        env:
          NEXT_TEST_MODE: deploy
          # knext's lifecycle scripts (the deploy-script contract).
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-cleanup.sh
          # The package dir e2e-deploy.sh `npm pack`s + installs into each temp app.
          ADAPTER_DIR: ${{ github.workspace }}/knext/packages/kn-next
          # knext's v2 deploy-eligible selection: it mirrors Next's own
          # test/deploy-tests-manifest.json include/exclude base set and adds the
          # knext architectural exclusions (the harness loads exactly ONE manifest
          # path — no comma-layering — so this file IS the complete selection).
          NEXT_EXTERNAL_TESTS_FILTERS: ${{ github.workspace }}/knext/test/deploy-tests-manifest.knext.json
          KNEXT_RUNTIME: node
          # #147 (round 4) — the prebuilt pivot. A JSON [[name, tarballPath]] map.
          # `test/lib/create-next-install.js` reads this and SKIPS `linkPackages`
          # (the source-pack step), installing the PUBLISHED `next` tarball into
          # each fixture app instead. This is why build-next no longer compiles
          # next from source. `@next/swc` resolves from the tarball's
          # optionalDependencies during that install.
          NEXT_TEST_PKG_PATHS: '[["next", "${{ github.workspace }}/next-prebuilt/next.tgz"]]'
          # #147 / A3-3 — point next at the prebuilt @next/swc native binary hydrated
          # above. The harness checks NEXT_TEST_NATIVE_DIR FIRST when loading SWC
          # (packages/next/src/build/swc/index.ts), so both the workspace-next build
          # and the fixture `next build` (deploy script) skip the WASM-download /
          # `pnpm config get registry` path that failed every test in run 28317087611.
          NEXT_TEST_NATIVE_DIR: ${{ steps.swc.outputs.dir }}
        # `|| true`: a partial-subset scaffold WILL have failures today; we still
        # want the summary artifact emitted. The matrix row stays ❌ regardless.
        run: |
          node run-tests.js --type e2e -g ${{ matrix.shard }} 2>&1 | tee runner.log || true

      - name: Compute excluded count from manifest
        id: excl
        working-directory: knext
        run: |
          COUNT=$(node -e "console.log(require('./test/deploy-tests-manifest.knext.json').rules.exclude.length)")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Summarize shard result
        working-directory: knext
        run: |
          SAFE_SHARD="${{ matrix.shard }}"
          SAFE_SHARD="${SAFE_SHARD/\//-}"
          node scripts/e2e-summary.mjs \
            --runner-log "${{ github.workspace }}/next.js/runner.log" \
            --ref "${NEXTJS_REF}" \
            --shard "${{ matrix.shard }}" \
            --excluded "${{ steps.excl.outputs.count }}" \
            --out "compat-suite-summary-${SAFE_SHARD}.json"

      - name: Upload summary artifact (consumed by #41 matrix publisher)
        uses: actions/upload-artifact@v4
        with:
          name: compat-suite-summary-${{ strategy.job-index }}
          path: knext/compat-suite-summary-*.json
          retention-days: 14
