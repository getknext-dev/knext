name: Compat suite (official Next.js deploy harness)

# ─────────────────────────────────────────────────────────────────────────────
# #89 / ADR-0007 A3-2 — the AUTHORITATIVE (slow) compatibility gate.
#
# This runs the OFFICIAL Next.js adapter compatibility harness: it checks out
# vercel/next.js at a PINNED ref, builds it, and runs `run-tests.js` in
# NEXT_TEST_MODE=deploy against knext's lifecycle scripts (scripts/e2e-*.sh) +
# the deploy manifest (test/deploy-tests-manifest.knext.json).
#
# HONESTY: this is an MVP SCAFFOLD. It runs a REAL but PARTIAL subset (modest
# shard count, Node runtime only to start). It does NOT yet pass the full suite,
# and its mere existence must NOT be read as "knext passes the official suite".
# The compat-matrix official-suite row stays ❌ until a green nightly (a separate
# graduation PR, ADR-0007 A3-3). The exclude-list (the manifest) is an honest
# ledger that grows from OBSERVED failures, never a pre-emptive fake green.
#
# Deliberately NOT in ci.yml: heavyweight (clones+builds Next.js + Playwright).
# Nightly + manual dispatch only — the fast per-PR gate is the compat-smoke job.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      nextjsRef:
        description: 'vercel/next.js git ref to test against (pinned tag; do NOT use canary)'
        required: false
        default: 'v16.0.3'
  schedule:
    # 03:17 UTC nightly — off-peak; the run takes the better part of an hour.
    - cron: '17 3 * * *'

# Pin the Next.js ref so a failure is attributable to knext, not upstream churn.
# Aligns with the in-repo next@16.0.3 (CLAUDE.md / ADR-0007 version-skew caveat).
# NEXTJS_REF is the git TAG (kept for the source checkout that supplies the
# `test/` harness + `run-tests.js`); NEXT_NPM_VERSION is the published npm version
# (the tag minus the leading `v`) we `npm pack` the PREBUILT `next` from.
env:
  NEXTJS_REF: ${{ github.event.inputs.nextjsRef || 'v16.0.3' }}

jobs:
  build-next:
    name: Prepare prebuilt next + harness
    runs-on: ubuntu-latest
    # #147 step 1 (round 4 — the PREBUILT pivot). Rounds 1–3 tried to make this
    # job COMPILE next.js v16.0.3 from source within the runner window (timeout
    # 60→120→180, a build scoped to next + its workspace deps, a GHA-backed turbo
    # remote cache to incrementally persist a cancelled build). The source build
    # proved NON-CONVERGENT: even the scoped build exceeded the 180-min ceiling
    # across two cache-warming dispatches, so the 4 deploy-tests shards NEVER ran.
    #
    # PIVOT: stop building `next` from source. The PUBLISHED `next@16.0.3` npm
    # tarball IS the built `packages/next` at the same version — so testing the
    # knext adapter against it is functionally equivalent (arguably MORE correct
    # for an adapter compat test: it's the artifact real users install). The
    # reference deploy harness supports this FIRST-CLASS: when `NEXT_TEST_PKG_PATHS`
    # is set (a JSON [[name, tarballPath]] map), `test/lib/create-next-install.js`
    # SKIPS `linkPackages` (the source-pack step) and installs the provided
    # tarball into each fixture app. We still check out next.js at the pinned ref
    # for its `test/` harness + `run-tests.js`, and still `corepack pnpm install`
    # next.js's own deps so the harness runs — but `next` itself is the prebuilt
    # tarball, and `@next/swc` arrives prebuilt from that tarball's
    # optionalDependencies during the per-fixture install. No Rust, no source TS.
    #
    # DESIGN DEVIATION (for the architect, ADR-0007): the reference harness builds
    # `next` from the pinned SOURCE; we test against the PUBLISHED package of the
    # same version. Flagged in the PR for review.
    #
    # The timeout stays generous as headroom, but `npm pack` is now minutes.
    timeout-minutes: 180
    steps:
      - name: Checkout knext
        uses: actions/checkout@v4
        with:
          path: knext

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Pin explicitly: knext is checked out under `path: knext`, so the action
        # cannot resolve a `packageManager` field at the workspace root and would
        # die with "No pnpm version is specified" — which skipped the deploy-tests
        # shards entirely. Keep in sync with `packageManager` in package.json.
        with:
          version: 10.4.1

      - name: Install knext deps
        working-directory: knext
        run: pnpm install --frozen-lockfile

      # Build the runtime + the adapter package so `npm pack @knext/core` ships a
      # working adapter for NEXT_ADAPTER_PATH.
      - name: Build @knext/lib + @knext/core
        working-directory: knext
        run: |
          pnpm --filter @knext/lib build
          pnpm --filter @knext/core build

      - name: Pack @knext/core adapter tarball
        working-directory: knext/packages/kn-next
        run: |
          npm pack
          ls -1 *.tgz

      # #147 (round 4) — derive the published npm VERSION from the git tag ref
      # (`v16.0.3` → `16.0.3`), then `npm pack` the PREBUILT `next` from the npm
      # registry. This tarball replaces the source build entirely. We stage it at
      # a STABLE path (next-prebuilt/next.tgz) under github.workspace so the
      # downloaded artifact resolves it identically in the shard jobs.
      - name: Acquire prebuilt next (npm pack)
        id: prebuilt
        run: |
          NEXT_NPM_VERSION="${NEXTJS_REF#v}"
          echo "Packing published next@${NEXT_NPM_VERSION}"
          mkdir -p "${GITHUB_WORKSPACE}/next-prebuilt"
          ( cd "${GITHUB_WORKSPACE}/next-prebuilt" \
            && TARBALL="$(npm pack "next@${NEXT_NPM_VERSION}" --silent | tail -n1)" \
            && mv "${TARBALL}" next.tgz )
          ls -la "${GITHUB_WORKSPACE}/next-prebuilt"
          echo "version=${NEXT_NPM_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout vercel/next.js (pinned ref — supplies the test harness)
        uses: actions/checkout@v4
        with:
          repository: vercel/next.js
          ref: ${{ env.NEXTJS_REF }}
          path: next.js

      # IMPORTANT (the #137 follow-up): next.js v16.0.3 declares its OWN required
      # pnpm (`packageManager: pnpm@9.6.0`), which CLASHES with the knext pin
      # (10.4.1) set above via pnpm/action-setup. A single global pnpm cannot
      # satisfy both — running the next.js install under 10.4.1 fails the engine
      # check ("Unsupported engine ... wanted pnpm 9.6.0") and SKIPs every shard.
      # Fix: drive the next.js steps through corepack, which auto-selects pnpm
      # per-project from next.js's `packageManager` field. We call `corepack
      # pnpm` explicitly (not bare `pnpm`) so it resolves next.js's 9.6.0 rather
      # than the action-setup 10.4.1 shim on PATH. The knext build steps above
      # stay on 10.4.1; never hardcode 9.6.0 here — let corepack honor upstream.
      - name: Enable corepack (next.js per-project package manager)
        working-directory: next.js
        run: corepack enable

      # Install next.js's OWN deps so `run-tests.js` + the source `test/` harness
      # run. We do NOT build `next` here — the prebuilt tarball IS `next`, and the
      # prebuilt `@next/swc` native binary arrives from that tarball's
      # optionalDependencies during each fixture app's install (the harness handles
      # it). This install is the only heavyweight step and is bounded (minutes).
      - name: Setup Next.js test-harness deps + Playwright
        working-directory: next.js
        run: |
          corepack pnpm install
          corepack pnpm playwright install chromium --with-deps

      # Cache the prepared knext + next.js trees + the prebuilt next tarball for
      # the shard jobs.
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: compat-workspace
          path: |
            knext
            next.js
            next-prebuilt
          retention-days: 1
          include-hidden-files: true

  deploy-tests:
    name: Deploy tests (shard ${{ matrix.shard }})
    needs: build-next
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # MVP: a MODEST 4-way shard (the reference uses 16). Bump deliberately as
        # the suite stabilizes; 4 keeps the nightly cost honest for the scaffold.
        shard: ['1/4', '2/4', '3/4', '4/4']
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: compat-workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Same pin as build-next: the workspace is the downloaded artifact, with
        # no resolvable `packageManager` at its root. Keep in sync with package.json.
        with:
          version: 10.4.1

      - name: Make lifecycle scripts executable
        working-directory: knext
        run: chmod +x scripts/e2e-deploy.sh scripts/e2e-logs.sh scripts/e2e-cleanup.sh

      - name: Run official deploy tests (knext adapter)
        working-directory: next.js
        env:
          NEXT_TEST_MODE: deploy
          # knext's lifecycle scripts (the deploy-script contract).
          NEXT_TEST_DEPLOY_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-deploy.sh
          NEXT_TEST_DEPLOY_LOGS_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-logs.sh
          NEXT_TEST_CLEANUP_SCRIPT_PATH: ${{ github.workspace }}/knext/scripts/e2e-cleanup.sh
          # The package dir e2e-deploy.sh `npm pack`s + installs into each temp app.
          ADAPTER_DIR: ${{ github.workspace }}/knext/packages/kn-next
          # Layer knext's exclude/include ledger on top of Next's deploy-eligible set.
          NEXT_EXTERNAL_TESTS_FILTERS: ${{ github.workspace }}/knext/test/deploy-tests-manifest.knext.json
          KNEXT_RUNTIME: node
          # #147 (round 4) — the prebuilt pivot. A JSON [[name, tarballPath]] map.
          # `test/lib/create-next-install.js` reads this and SKIPS `linkPackages`
          # (the source-pack step), installing the PUBLISHED `next` tarball into
          # each fixture app instead. This is why build-next no longer compiles
          # next from source. `@next/swc` resolves from the tarball's
          # optionalDependencies during that install.
          NEXT_TEST_PKG_PATHS: '[["next", "${{ github.workspace }}/next-prebuilt/next.tgz"]]'
        # `|| true`: a partial-subset scaffold WILL have failures today; we still
        # want the summary artifact emitted. The matrix row stays ❌ regardless.
        run: |
          node run-tests.js --type e2e -g ${{ matrix.shard }} 2>&1 | tee runner.log || true

      - name: Compute excluded count from manifest
        id: excl
        working-directory: knext
        run: |
          COUNT=$(node -e "console.log(require('./test/deploy-tests-manifest.knext.json').rules.exclude.length)")
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Summarize shard result
        working-directory: knext
        run: |
          SAFE_SHARD="${{ matrix.shard }}"
          SAFE_SHARD="${SAFE_SHARD/\//-}"
          node scripts/e2e-summary.mjs \
            --runner-log "${{ github.workspace }}/next.js/runner.log" \
            --ref "${NEXTJS_REF}" \
            --shard "${{ matrix.shard }}" \
            --excluded "${{ steps.excl.outputs.count }}" \
            --out "compat-suite-summary-${SAFE_SHARD}.json"

      - name: Upload summary artifact (consumed by #41 matrix publisher)
        uses: actions/upload-artifact@v4
        with:
          name: compat-suite-summary-${{ strategy.job-index }}
          path: knext/compat-suite-summary-*.json
          retention-days: 14
