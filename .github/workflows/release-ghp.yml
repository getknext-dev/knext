# Release — interim GitHub Packages channel (@getknext-dev/*)
#
# WHY: the canonical release path is npmjs under the `@knext/*` scope
# (.github/workflows/release.yml + changesets), blocked on a human NPM_TOKEN.
# Until npmjs goes live, the maintainer directive is "use GitHub Packages for
# now". GitHub Packages requires the package SCOPE to match the owning org, so
# this channel republishes the three publishable packages as:
#     @knext/lib  -> @getknext-dev/lib
#     @knext/db   -> @getknext-dev/db
#     @knext/core -> @getknext-dev/core
# (#255/#256: @knext/core depends on @knext/db — a lib+core-only publish set
# shipped an @getknext-dev/core that 404'd on install.)
# scripts/rename-for-ghp.mjs stages renamed COPIES (never mutating the tree),
# rewrites the hardcoded `@knext/lib` + `@knext/db` imports baked into the
# externalized dists (core hardcodes both; db hardcodes @knext/lib), resolves
# `workspace:` deps, and strips `publishConfig.provenance`
# (provenance needs npmjs/OIDC — it is NOT available on this path).
#
# This is manual-only (workflow_dispatch) and relates to — does NOT close — #53.
# Full runbook: docs/RELEASING.md.

name: Release (GitHub Packages, interim)

on:
  workflow_dispatch:

concurrency:
  group: release-ghp-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # publish to npm.pkg.github.com via GITHUB_TOKEN
  # NOTE: no id-token — the GHP path publishes WITHOUT provenance.

jobs:
  # npm/JS supply-chain gate (v4-P3) — identical gate to release.yml, applied to
  # the GHP interim channel too. Audits the PUBLISHED production closure
  # (--omit=dev) of @knext/{core,lib,db} (the SAME source the rename script
  # stages as @getknext-dev/*), FAILS on HIGH/CRITICAL, and emits a CycloneDX
  # SBOM per package. PUBLISH-BLOCKING: publish-ghp `needs: audit`.
  audit:
    name: npm supply-chain audit + JS SBOM (blocks publish)
    runs-on: ubuntu-latest
    if: github.repository == 'getknext-dev/knext'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm --filter @knext/lib build && pnpm --filter @knext/db build && pnpm --filter @knext/core build

      - name: Audit published production closure + generate SBOMs
        run: node scripts/audit-published.mjs

      - name: Upload JS SBOMs (CycloneDX)
        uses: actions/upload-artifact@v4
        with:
          name: npm-sbom-ghp
          path: sbom/*.cdx.json
          if-no-files-found: error

  publish-ghp:
    name: Publish @getknext-dev/* to GitHub Packages
    runs-on: ubuntu-latest
    # Publish-BLOCKING supply-chain gate: never publish tarballs the audit did
    # not clear. Does NOT unblock #53 (this is the interim GHP channel).
    needs: audit
    # Only ever run on the canonical repo (never forks).
    if: github.repository == 'getknext-dev/knext'
    outputs:
      # The just-published @getknext-dev/core version — the smoke job installs
      # exactly this version from the registry channel (never a floating tag).
      core-version: ${{ steps.published-version.outputs.core-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Writes an .npmrc scoping @getknext-dev to GitHub Packages and wiring
          # NODE_AUTH_TOKEN as the auth token for npm.pkg.github.com.
          registry-url: 'https://npm.pkg.github.com'
          scope: '@getknext-dev'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build in dependency order: @knext/lib, then @knext/db (depends on lib;
      # holds the `kn-next db migrate` runner, #242), then @knext/core (which
      # type-imports both @knext/lib and @knext/db at build time).
      - name: Build publishable packages
        run: pnpm --filter @knext/lib build && pnpm --filter @knext/db build && pnpm --filter @knext/core build

      # Stage renamed copies into .ghp-staging/{lib,db,core}. Fails LOUDLY if any
      # staged package's dist no longer contains the externalized imports for one
      # of its @knext/* deps (per-dependency layout-drift guard), or if a staged
      # package depends on an @knext/* package outside the publish set.
      - name: Stage packages for GitHub Packages
        run: node scripts/rename-for-ghp.mjs

      # Publish in dependency order: lib first, then db (depends on lib), then
      # core (depends on both). Publishing from the staging dirs — which carry the
      # renamed @getknext-dev/* manifests — so the scope matches the owning org
      # GHP requires. A re-run of an already-published version is a hard error
      # (bump via changesets first), not a silent success.
      - name: Publish to GitHub Packages (lib, then db, then core)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          publish_dir() {
            local dir="$1"
            local pkg
            pkg="$(node -p "require('./$dir/package.json').name + '@' + require('./$dir/package.json').version")"
            echo "==> Publishing ${pkg} from ${dir}"
            local out
            if out="$(cd "$dir" && npm publish --registry https://npm.pkg.github.com 2>&1)"; then
              echo "$out"
              echo "==> Published ${pkg}"
            else
              echo "$out"
              if echo "$out" | grep -qiE 'EPUBLISHCONFLICT|409|cannot publish over|previously published|already exists'; then
                echo "::error::${pkg} is already published to GitHub Packages — bump versions via changesets first (see docs/RELEASING.md)."
              else
                echo "::error::npm publish failed for ${pkg}."
              fi
              exit 1
            fi
          }
          publish_dir ".ghp-staging/lib"
          publish_dir ".ghp-staging/db"
          publish_dir ".ghp-staging/core"

      # Surface the just-published core version so the consumer smoke job installs
      # EXACTLY it (@getknext-dev/core@<version>), not a floating dist-tag.
      - name: Record published core version
        id: published-version
        run: |
          set -euo pipefail
          v="$(node -p "require('./.ghp-staging/core/package.json').version")"
          echo "core-version=${v}" >>"$GITHUB_OUTPUT"
          echo "==> published @getknext-dev/core@${v}"

  # P3a: the REGISTRY-CHANNEL consumer proof (v2-incident follow-up). Installs the
  # just-published @getknext-dev/core FROM npm.pkg.github.com as an outside consumer
  # would — repo-linked packages + GITHUB_TOKEN read, so NO new secret is needed —
  # and asserts the CLI bin runs and the public app-import surface resolves to real
  # JS. scripts/install-smoke.mjs proves the SOURCE tarball; this proves the
  # published REGISTRY channel is actually installable.
  smoke-ghp:
    name: Consumer install-smoke (@getknext-dev/* from GitHub Packages)
    runs-on: ubuntu-latest
    needs: publish-ghp
    if: github.repository == 'getknext-dev/knext'
    # READ-ONLY scopes below — a consumer NEVER publishes and needs no token minting.
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # The consumer smoke script writes its OWN .npmrc in a temp dir outside the
      # repo (scoping @getknext-dev to npm.pkg.github.com + wiring GITHUB_TOKEN),
      # asserts the scope registry resolves to pkg.github.com BEFORE installing,
      # installs @getknext-dev/core@<the-just-published-version>, then audits every
      # resolved @getknext-dev/* tarball URL is on pkg.github.com before running the
      # CLI + app-import assertions. The @getknext-dev:registry line below documents
      # the scope this job proves; the script is the source of truth.
      - name: Consumer install-smoke against the GitHub Packages channel
        env:
          # @getknext-dev:registry=https://npm.pkg.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ghp-install-smoke.mjs --version "${{ needs.publish-ghp.outputs.core-version }}"
