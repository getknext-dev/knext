name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26", cache-dependency-path: gateway/go.sum }
      - name: gofmt
        working-directory: gateway
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
      - name: vet
        working-directory: gateway
        run: go vet ./...
      - name: test
        working-directory: gateway
        run: go test ./...
      - name: build image
        run: docker build -t scale-zero-pg/gateway:ci gateway/

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create kind cluster
        uses: helm/kind-action@v1
      - name: validate manifests (server dry-run + contracts)
        run: sh deploy/_validate.sh

  # skctl.py is the reverse-engineered safekeeper.control (de)serializer that
  # writable restore depends on. It hand-packs a binary struct (magic cafeceef,
  # format v9, CRC32C) — a silent regression ships a subtly-corrupt restore.
  # This job guards byte-identity against a REAL neon:8464 control file plus the
  # magic/version/crc rejection paths (issues #22, #24). Stdlib only, no cluster.
  skctl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: skctl serializer round-trip + version-guard tests
        run: python3 -m unittest discover -s deploy -p 'test_skctl.py' -v

  # provision-app.sh app-name / reserved-name validation (issues #79/#74). No
  # cluster: validate_app_name runs before any kubectl call, so bad names fail
  # fast. Guards the tenant-boundary charset check against a locale-collation
  # regression (the LC_ALL=C fix).
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: provision-app.sh name-validation tests
        run: bash deploy/test_provision-app.sh

  # Full e2e (storage plane + wake loop) is heavy for CI; run on demand.
  e2e:
    if: contains(github.event.head_commit.message, '[e2e]')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: helm/kind-action@v1
      - name: build + load gateway image
        run: |
          docker build -t scale-zero-pg/gateway:dev gateway/
          kind load docker-image scale-zero-pg/gateway:dev --name chart-testing
      - name: deploy + verify
        run: |
          kubectl apply -f deploy/
          sh deploy/_verify-storage.sh
          sh deploy/_verify-wake.sh
