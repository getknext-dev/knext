name: CI

on:
  pull_request:
    branches: ['*']
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome lint & format check
        run: pnpm run lint

      # Fail FAST on the TS5097 main-red class (#289): a relative import written
      # with an explicit .ts/.tsx extension passes vitest at runtime but fails
      # `tsc --noEmit` under moduleResolution:bundler. Runs before the builds so
      # the branch goes red at PR time, not only after the post-build typecheck.
      - name: Guard — no .ts/.tsx import extensions (TS5097)
        run: pnpm run lint:ts-imports

      # @knext/core ships only dist/ and its exports resolve to ./dist/* (#114).
      # The publish-surface test asserts every exports subpath exists in dist, so
      # core MUST be built before vitest runs. @knext/lib must be built first —
      # core's dts build imports @knext/lib/clients types (next-adapter.ts:122),
      # so without lib's dist the core build hard-fails (TS2307). Same lib→core
      # order as the compat-smoke and bytecode jobs.
      - name: Build @knext/lib
        run: pnpm --filter @knext/lib build

      # @knext/core type-imports @knext/db (the `kn-next db migrate` runner lives
      # in @knext/db/migrate, #242), so without db's dist the core build hard-fails
      # (TS2307). db depends on lib, so the order is lib→db→core.
      - name: Build @knext/db
        run: pnpm --filter @knext/db build

      - name: Build @knext/core
        run: pnpm --filter @knext/core build

      # Typecheck gate (#261): per-package `tsc --noEmit` so the strict-mode
      # baseline can never regrow silently. Runs AFTER the lib→db→core builds
      # above because the checks are dist-dependent (core's cli/db-migrate.ts
      # imports @knext/db/migrate, next-adapter.ts imports @knext/lib/clients —
      # both TS2307 without the upstream dist). lib/db typecheck through
      # tsconfig.typecheck.json, which (unlike their build tsconfigs) pulls the
      # test files into scope — the exact gap this gate closes.
      - name: Typecheck @knext/lib (tsc --noEmit, tests in scope)
        run: pnpm --filter @knext/lib typecheck

      - name: Typecheck @knext/db (tsc --noEmit, tests in scope)
        run: pnpm --filter @knext/db typecheck

      - name: Typecheck @knext/core (tsc --noEmit, tests in scope)
        run: pnpm --filter @knext/core typecheck

      # @knext/ui (private component lib) — self-contained, no dist deps; the
      # P6c coverage guard (ci-typecheck-contract.test.ts) requires every TS
      # workspace member be gated or documented-excluded.
      - name: Typecheck @knext/ui (tsc --noEmit)
        run: pnpm --filter @knext/ui typecheck

      # apps/db-demo — dist-dependent on @knext/db + @knext/core (imports
      # @knext/db and @knext/db/schema), so it runs AFTER those builds above.
      - name: Typecheck db-demo (tsc --noEmit)
        run: pnpm --filter db-demo typecheck

      - name: Run tests
        run: pnpm exec vitest run --coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  compat-smoke:
    # knext adapter SMOKE suite — NOT the official Next.js compatibility suite (ADR-0007,
    # option C). Builds apps/file-manager through the knext adapter (output:'standalone'),
    # boots the standalone server.js on Node and Bun, and asserts real HTTP behaviors.
    # The official deploy-test harness is a separate scheduled job (A3-2, compat-suite-full).
    name: knext adapter smoke (NOT official compat suite)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @knext/lib and @knext/core both ship only dist/ — they MUST be built
      # before the app. file-manager imports @knext/core/adapters/otel-config and
      # the KnativeNextConfig type, and @knext/core's exports now resolve to
      # ./dist/* (#114), so a missing core build breaks `next build`.
      - name: Build @knext/lib
        run: pnpm --filter @knext/lib build

      # @knext/core type-imports @knext/db (the `kn-next db migrate` runner lives
      # in @knext/db/migrate, #242), so without db's dist the core build hard-fails
      # (TS2307). db depends on lib, so the order is lib→db→core.
      - name: Build @knext/db
        run: pnpm --filter @knext/db build

      - name: Build @knext/core
        run: pnpm --filter @knext/core build

      - name: Build file-manager via adapter
        run: pnpm --filter file-manager build

      - name: Run knext compat-smoke (${{ matrix.runtime }})
        working-directory: apps/file-manager
        env:
          RUNTIME: ${{ matrix.runtime }}
        run: node scripts/compat-smoke.mjs

  bytecode-cache-reuse:
    # A2-2 (#38) Layer 1 per-PR GATE: proves the V8 bytecode cache is REUSED across
    # cold starts (no recompile). The deterministic proof needs the standalone build,
    # which is gitignored — so this job BUILDS it first, then runs the vitest spec
    # with KNEXT_REQUIRE_STANDALONE=1 so a missing build HARD-FAILS instead of
    # skipping silently (a green check can never mean "skipped").
    name: Bytecode cache reuse (Layer 1 gate)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @knext/lib and @knext/core both ship only dist/ — they MUST be built
      # before the app. @knext/core's exports now resolve to ./dist/* (#114), and
      # file-manager imports it, so a missing core build breaks `next build`.
      - name: Build @knext/lib
        run: pnpm --filter @knext/lib build

      # @knext/core type-imports @knext/db (the `kn-next db migrate` runner lives
      # in @knext/db/migrate, #242), so without db's dist the core build hard-fails
      # (TS2307). db depends on lib, so the order is lib→db→core.
      - name: Build @knext/db
        run: pnpm --filter @knext/db build

      - name: Build @knext/core
        run: pnpm --filter @knext/core build

      - name: Build file-manager standalone (next build --webpack)
        run: pnpm --filter file-manager build

      - name: Run bytecode-cache reuse gate (must NOT skip)
        env:
          # Converts the skipIf guard into a HARD failure if the build is missing.
          KNEXT_REQUIRE_STANDALONE: '1'
        run: pnpm exec vitest run apps/file-manager/bytecode-cache-reuse.test.ts

      # #344 seam-alive gate (reuses the standalone build above — no extra build):
      # asserts the @knext/lib module-state SEAMS survive the standalone bundle.
      # #352 shipped with db_wake + correlation DEAD in prod because @knext/lib is
      # DUPLICATED across the instrumentation vs app-server webpack layers and the
      # seam was not shared. The fix backs the seam with globalThis Symbol.for(...)
      # cells; this artifact assertion checks those symbols co-occur in BOTH the
      # instrumentation (writer) chunk AND an app-server (reader) chunk of the
      # real `next build --webpack` output — so a re-broken seam (or moving
      # @knext/lib into serverExternalPackages) fails the gate, not the deploy.
      - name: Run seam-alive artifact gate (#352/#344, must NOT skip)
        env:
          KNEXT_REQUIRE_STANDALONE: '1'
        run: pnpm exec vitest run apps/file-manager/standalone-seam-alive.test.ts

  sigterm-drain-shipped:
    # Per-PR GATE: proves the SHIPPED container layout actually boots the knext
    # runtime entry and drains in-flight requests on SIGTERM (security.md graceful
    # shutdown). The image CMD is `node -e import('@knext/core/internal/node-server')`,
    # but Next's standalone output is import-graph driven and NOTHING imports
    # node-server.js — so neither it nor its hard deps (prom-client, pino) are
    # traced into `.next/standalone`. The Dockerfile fixes this with a
    # `pnpm --prod deploy` of @knext/core into the runner; this job proves the fix
    # by assembling that exact layout and running the real CMD. Without it, the
    # image crash-loops at boot (ERR_MODULE_NOT_FOUND) while CI stays green —
    # exactly the regression this guards. KNEXT_REQUIRE_STANDALONE=1 hard-fails
    # (never skips) if the standalone build is missing.
    name: SIGTERM drain (shipped bundle gate)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @knext/lib and @knext/core ship only dist/ and must be built before the
      # app; the test also `pnpm deploy`s @knext/core (needs its dist present).
      - name: Build @knext/lib
        run: pnpm --filter @knext/lib build

      # @knext/core type-imports @knext/db (the `kn-next db migrate` runner lives
      # in @knext/db/migrate, #242), so without db's dist the core build hard-fails
      # (TS2307). db depends on lib, so the order is lib→db→core.
      - name: Build @knext/db
        run: pnpm --filter @knext/db build

      - name: Build @knext/core
        run: pnpm --filter @knext/core build

      - name: Build file-manager standalone (next build --webpack)
        run: pnpm --filter file-manager build

      - name: Run SIGTERM shipped-bundle gates — drain + hard-cap (must NOT skip)
        env:
          # Converts the skipIf guard into a HARD failure if the build is missing,
          # so a green check genuinely proves BOTH the graceful-drain path
          # (sigterm-drain-e2e) and the force-kill hard-cap safety net
          # (sigterm-hardcap-e2e). Both boot the shipped runtime entry; the drain
          # e2e binds the default metrics port 9091 and the hard-cap e2e overrides
          # METRICS_PORT=9092, so they coexist in one invocation without EADDRINUSE.
          KNEXT_REQUIRE_STANDALONE: '1'
        run: >-
          pnpm exec vitest run
          apps/file-manager/sigterm-drain-e2e.test.ts
          apps/file-manager/sigterm-hardcap-e2e.test.ts

  no-latest-guard:
    name: No :latest images in operator manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check operator manifests are digest-pinned
        run: bash packages/kn-next-operator/hack/check-no-latest.sh --quiet
      # Base-image-pin guard (refs #117): the operator runtime is distroless/static
      # + a CGO-disabled Go binary, so the only fixable Trivy HIGH/CRITICAL surface
      # is the Go stdlib version baked into the binary. A floating `golang:1.25`
      # builder can leak an unpatched stdlib CVE and fail the supply-chain Trivy
      # gate on main (blocking the bundle publish). This offline guard keeps the
      # builder pinned to a patched Go point release on every PR.
      - name: Check operator builder image is pinned to a patched Go release
        run: bash packages/kn-next-operator/hack/check-trivy-baseimage.bats.sh
      # Supply-chain hardening: EVERY Dockerfile FROM (app + operator) must be
      # pinned by @sha256: digest, not a floating tag — the base images determine
      # the CVE surface of the images we sign. Analogous to hadolint DL3006/DL3007.
      - name: Check all Dockerfile base images are digest-pinned
        run: bash scripts/check-base-images-pinned.sh --quiet

  operator-codegen-check:
    name: Operator codegen is up-to-date (make generate + make manifests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache: true
          cache-dependency-path: packages/kn-next-operator/go.sum
      - name: Run make generate
        working-directory: packages/kn-next-operator
        run: make generate
      - name: Run make manifests
        working-directory: packages/kn-next-operator
        run: make manifests
      - name: Fail if codegen produced a diff
        run: |
          if ! git diff --exit-code; then
            echo "ERROR: make generate or make manifests produced uncommitted changes."
            echo "Run 'make generate && make manifests' locally and commit the result."
            exit 1
          fi

  operator-test:
    # Issue #102: actually RUN the operator Go test suite in CI. `make test`
    # self-provisions envtest (setup-envtest dep) and excludes /e2e. We build the
    # install bundle first (make build-installer renders dist/install.yaml) so the
    # internal/install namespace-immunity tests RUN instead of skipping, and set
    # KNEXT_REQUIRE_BUNDLE=1 so a missing bundle HARD-FAILS — a green check can never
    # mean "skipped".
    name: Operator Go tests (envtest + install bundle)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/kn-next-operator/go.mod
          cache: true
          cache-dependency-path: packages/kn-next-operator/go.sum
      - name: Resolve envtest k8s version
        working-directory: packages/kn-next-operator
        run: echo "ENVTEST_K8S_VERSION=$(make print-envtest-version)" >> "$GITHUB_ENV"
      - name: Cache envtest + tool binaries
        uses: actions/cache@v4
        with:
          path: packages/kn-next-operator/bin
          key: ${{ runner.os }}-envtest-${{ env.ENVTEST_K8S_VERSION }}-${{ hashFiles('packages/kn-next-operator/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-envtest-
      - name: Set up envtest binaries
        working-directory: packages/kn-next-operator
        run: make setup-envtest
      - name: Build install bundle (so immunity tests run, not skip)
        working-directory: packages/kn-next-operator
        run: make build-installer
      - name: Run operator Go test suite (envtest)
        working-directory: packages/kn-next-operator
        env:
          # Converts the dist/install.yaml skip guards into a HARD failure if the
          # bundle is missing — the namespace-immunity contract must be gated.
          KNEXT_REQUIRE_BUNDLE: '1'
        run: make test

  prod-image-optimization:
    # #66 AC#2 + AC#3: the ONLY job that verifies next/image optimization in the
    # SHIPPED Alpine production image. It BUILDS apps/file-manager/Dockerfile (musl),
    # runs the container, and runs scripts/prod-image-probe.mjs — a STRICT, fail-closed
    # probe (unlike compat-smoke check 'g', which skip()s on non-200 so a no-bucket CI
    # stays green, and which only ever ran on the ubuntu/glibc standalone server.js).
    #
    # AC#3 (sharp present) is also enforced inside the build itself: the Dockerfile runs
    # `node -e require('sharp')` and `apk add vips`, so a missing musl runtime fails the
    # image build before this job even reaches the probe.
    name: Prod image next/image optimization (strict, #66)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (to run the probe on the host)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Cheap regression for the probe's fail-closed logic (no Docker needed):
      # proves the strict probe FAILS on 500 / wrong content-type / non-shrinking
      # output and PASSES only when all invariants hold. If this regresses, the
      # docker probe below could silently stop gating anything.
      - name: Self-test the strict probe (fail-closed)
        run: node apps/file-manager/scripts/prod-image-probe.selftest.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the production image. The Dockerfile's `RUN node -e require('sharp')`
      # verification (AC#3) fails the build here if sharp's musl runtime is missing.
      - name: Build production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/file-manager/Dockerfile
          target: runner
          tags: knext-file-manager:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run the production container
        run: |
          docker run -d --name knext-prod -p 3000:3000 \
            -e REDIS_URL="" \
            knext-file-manager:ci
          echo "container started"

      # STRICT probe — FAILS (does not skip) unless: HTTP 200 AND content-type is
      # image/webp|avif AND optimized body < source bytes. (#66 AC#2.)
      - name: Probe /_next/image (strict, fail-closed)
        env:
          BASE_URL: http://127.0.0.1:3000
        run: node apps/file-manager/scripts/prod-image-probe.mjs

      - name: Container logs (on failure)
        if: failure()
        run: docker logs knext-prod || true

      - name: Stop container
        if: always()
        run: docker rm -f knext-prod || true

  db-live-integration:
    # Plan P2 (ADR-0021): the @knext/db live-Postgres lane — the first place the
    # SDK's product claims (migrations apply + idempotent, read-your-writes, RO
    # routing, the one-shot CLI runner) touch a REAL database.
    #
    # SAFETY BY CONSTRUCTION: DATABASE_URL below is a HARDCODED, inline,
    # throwaway credential for the ephemeral service container — deliberately
    # NOT a secret. This job must reference NO `secrets.*` for the DSN
    # (tests/db-live-workflow.test.ts enforces it), so no real database DSN can
    # ever enter this lane; the suite's own host guard (live-dsn-guard.ts)
    # additionally refuses any non-loopback host before connecting.
    name: '@knext/db live Postgres integration'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: knext
          POSTGRES_PASSWORD: knext-ci-throwaway
          POSTGRES_DB: knext
        ports:
          - 5432:5432
        # Job start is gated on pg_isready-style container health — the suite
        # never races a booting Postgres (the plan's readiness-flake risk).
        options: >-
          --health-cmd "pg_isready -U knext -d knext"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      KNEXT_DB_LIVE: '1'
      # Inline throwaway DSN on loopback (the runner maps the service port).
      DATABASE_URL: postgres://knext:knext-ci-throwaway@127.0.0.1:5432/knext
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The live suite + its hermetic guards (DSN host guard, workflow contract).
      - name: Run the live @knext/db suite
        run: >-
          pnpm exec vitest run
          packages/db/src/__tests__/integration/live-postgres.test.ts
          packages/db/src/__tests__/live-dsn-guard.test.ts
          tests/db-live-workflow.test.ts

  docs-site:
    # Docs site (apps/docs, knext.dev) build gate — mirrors the compat-smoke
    # file-manager pattern: root workspace-aware install, build the @knext chain
    # (lib→db→core) then knext-docs. The docs app consumes @knext/core via
    # `workspace:*` (it imports @knext/core, @knext/core/adapter, and
    # @knext/core/validate), so the chain MUST build before `next build`.
    #
    # Two build legs, BOTH required:
    #   1. vanilla (KNEXT_ADAPTER unset) — the managed-host build (what Vercel
    #      ships at knext.dev). Asserts .next/BUILD_ID.
    #   2. adapter (KNEXT_ADAPTER=1) — the self-host / dogfood leg. NON-OPTIONAL:
    #      exercises next.config's experimental.adapterPath branch so adapter-key
    #      drift under the monorepo's pinned Next is caught in CI. Asserts the
    #      standalone server at .next/standalone/apps/docs/server.js.
    #
    # Path-filtered: only runs when the docs app OR the public @knext/core surface
    # changes (turbo-cache-friendly — an unrelated PR skips the ~minutes-long
    # Fumadocs build).
    name: Docs site build (apps/docs → knext.dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # For push (main) the base is the previous commit; on PRs the action
          # diffs against the PR base automatically.
          filters: |
            docs:
              - 'apps/docs/**'
              - 'packages/kn-next/src/**'
              - 'packages/kn-next/package.json'
              - '.github/workflows/ci.yml'

      - name: Setup Node.js
        if: steps.filter.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        if: steps.filter.outputs.docs == 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.filter.outputs.docs == 'true'
        run: pnpm install --frozen-lockfile

      # lib→db→core, same ordering rationale as compat-smoke: core's dts build
      # type-imports @knext/lib/clients and @knext/db/migrate, so both must ship
      # dist first or core's build hard-fails (TS2307). knext-docs then resolves
      # @knext/core (and its ./adapter + ./validate subpaths) against that dist.
      - name: Build @knext/lib
        if: steps.filter.outputs.docs == 'true'
        run: pnpm --filter @knext/lib build

      - name: Build @knext/db
        if: steps.filter.outputs.docs == 'true'
        run: pnpm --filter @knext/db build

      - name: Build @knext/core
        if: steps.filter.outputs.docs == 'true'
        run: pnpm --filter @knext/core build

      # Config-validate gate: run the docs dogfood kn-next.config.ts through the
      # REAL @knext/core/validate (the public surface), same code path
      # `kn-next deploy` uses. Proves the workspace `./validate` export resolves.
      - name: Validate the docs kn-next.config.ts (real validateConfig)
        if: steps.filter.outputs.docs == 'true'
        working-directory: apps/docs
        run: pnpm config:validate

      # Leg 1 — vanilla managed-host build (Vercel parity; KNEXT_ADAPTER unset).
      - name: Build knext-docs (vanilla / managed-host, KNEXT_ADAPTER unset)
        if: steps.filter.outputs.docs == 'true'
        run: pnpm --filter knext-docs build

      - name: Assert vanilla build output
        if: steps.filter.outputs.docs == 'true'
        run: test -f apps/docs/.next/BUILD_ID

      # Leg 2 — adapter / self-host dogfood build (NON-OPTIONAL). Exercises the
      # experimental.adapterPath branch so adapter-key drift is caught here.
      - name: Build knext-docs via adapter (KNEXT_ADAPTER=1, self-host dogfood)
        if: steps.filter.outputs.docs == 'true'
        env:
          KNEXT_ADAPTER: '1'
        run: pnpm --filter knext-docs build

      - name: Assert adapter standalone server output
        if: steps.filter.outputs.docs == 'true'
        run: test -f apps/docs/.next/standalone/apps/docs/server.js

      # Materialise the DOCS-SCOPED dependency closure. Under pnpm the whole
      # workspace shares ONE root pnpm-lock.yaml and node_modules hoists to the
      # root — so `scan-ref: apps/docs` finds NOTHING (no local lockfile). Instead
      # `turbo prune` emits a pruned workspace whose pnpm-lock.yaml contains ONLY
      # knext-docs + its @knext/{core,db,lib} closure. Trivy scans THAT lockfile,
      # so the npm→pnpm transitive shifts (and the root pnpm.overrides Trivy
      # remediations) are checked against the docs-only tree, not the whole repo.
      - name: Prune docs dependency closure (turbo prune → scoped lockfile)
        if: steps.filter.outputs.docs == 'true'
        run: pnpm exec turbo prune knext-docs --out-dir ./.docs-closure

      # Trivy fs scan of the docs closure lockfile. Report (don't block) on PRs;
      # ENFORCE (fail) on main — the same phased gate the image supply-chain job
      # uses. FAIL on HIGH/CRITICAL. NOTE: the pruned closure pulls in the shared
      # workspace DEV toolchain (vitest→vite→rollup, picomatch) — any HIGH there is
      # a pre-existing REPO-WIDE toolchain CVE (remediate via the root
      # pnpm.overrides, like the other entries), not a docs-runtime issue; next /
      # fumadocs / react are clean.
      - name: Trivy scan — docs dependency closure (FAIL on HIGH/CRITICAL)
        if: steps.filter.outputs.docs == 'true'
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: ./.docs-closure/pnpm-lock.yaml
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  docs-drift-reminder:
    # SOFT, NON-BLOCKING nudge (judgment-based, never a hard gate):
    #   (a) if a PR changes public surface (packages/kn-next/src exports, config
    #       schema, CLI) WITHOUT touching apps/docs/content/**, warn "docs may
    #       need an update — knext.dev is user-facing".
    #   (b) grep the apps/docs/content/** DIFF for internal refs
    #       (ADR-NNNN | #NN | vinext | Nitro) and warn — the site stays
    #       user-facing even living beside the code + ADRs.
    # Both are ::warning:: annotations only; the job always succeeds.
    name: Docs drift reminder (soft, non-blocking)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Public-surface-changed-without-docs reminder
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
          CHANGED="$(git diff --name-only "$BASE"...HEAD || true)"
          echo "Changed files:"; echo "$CHANGED"
          SURFACE="$(echo "$CHANGED" | grep -E '^packages/kn-next/src/|^packages/kn-next/package.json' || true)"
          DOCS="$(echo "$CHANGED" | grep -E '^apps/docs/content/' || true)"
          if [ -n "$SURFACE" ] && [ -z "$DOCS" ]; then
            echo "::warning title=Docs may need an update::Public @knext/core surface changed but apps/docs/content/** was not touched. knext.dev is user-facing — did the docs need an update? (Judgment-based reminder, not a gate.)"
          else
            echo "No public-surface-without-docs drift detected."
          fi

      - name: User-facing internal-reference reminder (content/** only)
        run: |
          BASE="origin/${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" || true
          # Only scan ADDED lines in content/** — the app's next-adapter/config
          # legitimately reference internals; this guard is content-only.
          DIFF="$(git diff "$BASE"...HEAD -- 'apps/docs/content/**' || true)"
          HITS="$(echo "$DIFF" | grep -E '^\+' | grep -vE '^\+\+\+' | grep -EI 'ADR-[0-9]|#[0-9]{2,}|vinext|Nitro' || true)"
          if [ -n "$HITS" ]; then
            echo "::warning title=Possible internal reference in user-facing docs::Added lines under apps/docs/content/** contain internal references (ADR-NNNN, #NN, vinext, or Nitro). knext.dev is user-facing — scrub internal refs. (Judgment-based reminder, not a gate.)"
            echo "$HITS"
          else
            echo "No internal references detected in added content/** lines."
          fi
