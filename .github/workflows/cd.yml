name: cd
on:
  push:
    branches: [main]
    paths: ["gateway/**", ".github/workflows/cd.yml"]
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: login OCIR
        uses: docker/login-action@v3
        with:
          registry: me-abudhabi-1.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}
      - name: resolve tags
        id: meta
        run: |
          SHORT=${GITHUB_SHA::7}
          TAGS="me-abudhabi-1.ocir.io/axfqznklsd2t/ks-pg/gateway:sha-${SHORT},me-abudhabi-1.ocir.io/axfqznklsd2t/ks-pg/gateway:edge"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAGS="$TAGS,me-abudhabi-1.ocir.io/axfqznklsd2t/ks-pg/gateway:${GITHUB_REF#refs/tags/}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: build + push (amd64 - OKE nodes)
        uses: docker/build-push-action@v6
        with:
          context: gateway
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
